<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Camera Region Editor</title>
  <style>
    :root{
      --gap: 16px;
      --fg: #fff;
      --bg: #292929;
      --button-fg: #ddd;
      --button-bg: rgb(30,30,30);
      --button-bg-disabled: rgb(22,22,22);
      --button-fg-disabled: #666;
      --drop-shadow: 0 8px 20px rgba(0,0,0,0.35);
      --stream-bg: #000;

      --wire: rgba(200,200,200,0.95);
      --wire-selected: rgba(255,220,70,0.98);
      --wire-outline: rgba(0,0,0,0.85);
      --wire-width: 2.25;
      --wire-outline-width: 4.75;
      --label-font: 13px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      --label-pad: 6;
      --label-radius: 6;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .page{
      min-height: 100%;
      display:flex;
      flex-direction:column;
      box-sizing:border-box;
      padding:var(--gap);
      gap:var(--gap);
    }

    .toolbar{
      display:grid;
      grid-template-columns: auto 1fr auto;
      align-items:center;
      gap: var(--gap);
    }

    .logo{
      height: calc(2 * 42px + 8px);
      width: 220px;
      max-width: 28vw;
      border-radius: 12px;
      box-shadow: var(--drop-shadow);
      background: url("/logo.png") no-repeat center / contain;
      background-color: rgba(0,0,0,0.15);
      user-select:none;
    }

    .controls{
      display:grid;
      grid-template-columns: 1fr;
      gap: 8px;
      min-width: 0;
    }

    .row{
      display:flex;
      align-items:center;
      gap: 10px;
      min-width:0;
      flex-wrap: nowrap;
    }

    .row .spacer{ flex: 1; }

    button, input, select, label.filebtn{
      border: 1px solid rgba(255,255,255,0.10);
      background: var(--button-bg);
      color: var(--button-fg);
      border-radius: 12px;
      box-shadow: var(--drop-shadow);
      padding: 10px 12px;
      font: 600 14px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      letter-spacing: 0.2px;
      outline: none;
      transition: transform 80ms ease, opacity 80ms ease, border-color 120ms ease;
    }

    button:hover:not(:disabled), label.filebtn:hover{
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.22);
      cursor:pointer;
    }

    button:active:not(:disabled), label.filebtn:active{
      transform: translateY(0px);
      opacity: 0.9;
    }

    button:disabled, input:disabled, select:disabled, label.filebtn.disabled{
      background: var(--button-bg-disabled);
      color: var(--button-fg-disabled);
      box-shadow: none;
      border-color: rgba(255,255,255,0.06);
      cursor:not-allowed;
      transform:none;
      opacity: 0.9;
    }

    input, select{
      font-weight: 500;
      padding: 10px 10px;
      min-width: 0;
    }

    .small{
      font: 12px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      opacity: 0.85;
      user-select:none;
      white-space: nowrap;
    }

    .regionpicker{
      display:flex;
      gap: 10px;
      align-items:center;
      min-width: 0;
      flex: 1;
    }

    #regionSelect{
      width: 210px;
      max-width: 20vw;
    }
    #regionName{ flex: 1; min-width: 0; }
    #regionDesc{ flex: 1; min-width: 0; }

    .wrap{
      flex:1;
      display:flex;
      align-items: stretch;
      justify-content:center;
      min-height: 0;
    }

    .card{
      position:relative;
      width: 100%;
      max-width: 1800px;
      border-radius: 12px;
      overflow:hidden;
      box-shadow: var(--drop-shadow);
      background: var(--stream-bg);
      user-select:none;
      min-height: 0;
    }

    .stage{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background: #111;
    }

    img#photo{
      max-width:100%;
      max-height:100%;
      width:auto;
      height:auto;
      display:block;
      object-fit: contain;
      user-select:none;
      -webkit-user-drag: none;
      pointer-events:none;
    }

    canvas#overlay{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:auto;
      touch-action:none;
    }

    .spinner{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(1px);
    }
    .spinner.show{ display:flex; }
    .spin{
      width: 60px;
      height: 60px;
      animation: rot 1.0s linear infinite;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.5));
      opacity: 0.95;
    }
    @keyframes rot { from { transform: rotate(0deg); } to { transform: rotate(360deg);} }

    .hint{
      position:absolute;
      left: 12px;
      bottom: 10px;
      font: 12px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      opacity: 0.65;
      user-select:none;
      pointer-events:none;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    input[type="file"]{ display:none; }
  </style>
</head>
<body>
  <div class="page">
    <div class="toolbar">
      <div class="logo" aria-label="Logo"></div>

      <div class="controls">
        <div class="row">
          <button id="btnRefresh">Refresh</button>
          <div class="small" id="lastRefresh">&nbsp;</div>

          <div class="regionpicker">
            <select id="regionSelect" disabled></select>
            <input id="regionName" type="text" placeholder="region_name" disabled />
          </div>

          <button id="btnNext" disabled>Next</button>
          <button id="btnAdd" disabled>Add</button>
          <button id="btnSave" disabled>Save</button>

          <label class="filebtn disabled" id="btnFileSave" title="Save regions to a file">
            File Save
          </label>
        </div>

        <div class="row">
          <div class="spacer"></div>
          <input id="regionDesc" type="text" placeholder="Description" disabled />

          <button id="btnPrev" disabled>Prev</button>
          <button id="btnDel" disabled>Del</button>
          <button id="btnRevert" disabled>Revert</button>

          <label class="filebtn disabled" id="btnFileLoad" title="Load regions from a file">
            File Load
          </label>
          <input id="fileInput" type="file" accept="application/json,.json" />
        </div>
      </div>

      <div></div>
    </div>

    <div class="wrap">
      <div class="card" id="card">
        <div class="stage" id="stage">
          <img id="photo" alt="Camera capture" />
          <canvas id="overlay"></canvas>

          <div class="spinner" id="spinner" aria-label="Loading">
            <!-- Easily replaceable spinner asset -->
            <svg class="spin" viewBox="0 0 50 50" aria-hidden="true">
              <circle cx="25" cy="25" r="20" fill="none" stroke="white" stroke-opacity="0.25" stroke-width="5"></circle>
              <path d="M45 25a20 20 0 0 1-20 20" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"></path>
            </svg>
          </div>

          <div class="hint">Drag inside region to move. Drag handles to resize/rotate.</div>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  // ---------- DOM ----------
  const btnRefresh = document.getElementById('btnRefresh');
  const btnPrev    = document.getElementById('btnPrev');
  const btnNext    = document.getElementById('btnNext');
  const btnAdd     = document.getElementById('btnAdd');
  const btnDel     = document.getElementById('btnDel');
  const btnSave    = document.getElementById('btnSave');
  const btnRevert  = document.getElementById('btnRevert');
  const btnFileSave= document.getElementById('btnFileSave');
  const btnFileLoad= document.getElementById('btnFileLoad');

  const lastRefresh = document.getElementById('lastRefresh');

  const regionSelect= document.getElementById('regionSelect');
  const regionName  = document.getElementById('regionName');
  const regionDesc  = document.getElementById('regionDesc');

  const fileInput   = document.getElementById('fileInput');

  const photo       = document.getElementById('photo');
  const overlay     = document.getElementById('overlay');
  const spinner     = document.getElementById('spinner');
  const card        = document.getElementById('card');

  // ---------- State ----------
  let imageReady = false;
  let imgW = 0, imgH = 0;  // natural image pixels
  let dispRect = null;     // displayed image rect within card, in CSS pixels (letterboxed)

  let regions = [];
  let selected = 0;
  let dirty = false;

  let loadingImage = false;
  let loadingRegions = false;
  let savingRegions = false;

  // drag: {mode:'move'|'resize'|'rotate', handle, startCanvas, centerCanvas0, g0, rot0, ang0, pointerId}
  let drag = null;

  // ---------- Helpers ----------
  const rad = (deg) => deg * Math.PI / 180;
  const deg = (r) => r * 180 / Math.PI;

  function nowLocalString(d) {
    const pad2 = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
  }

  function setSpinner(on) { spinner.classList.toggle('show', !!on); }

  function setDirty(v) { dirty = !!v; renderToolbar(); }

  function setFileBtnEnabled(labelEl, enabled) {
    labelEl.classList.toggle('disabled', !enabled);
    labelEl.tabIndex = enabled ? 0 : -1;
    labelEl.setAttribute('aria-disabled', enabled ? 'false' : 'true');
  }

  function renderToolbar() {
    btnSave.textContent = (dirty ? "• Save" : "Save");

    btnRefresh.disabled = loadingImage;

    const haveRegions = regions.length > 0;
    const regionsBusy = loadingRegions || savingRegions;

    regionSelect.disabled = regionsBusy || !haveRegions;
    regionName.disabled   = regionsBusy || !haveRegions;
    regionDesc.disabled   = regionsBusy || !haveRegions;

    btnPrev.disabled   = regionsBusy || !haveRegions;
    btnNext.disabled   = regionsBusy || !haveRegions;
    btnDel.disabled    = regionsBusy || !haveRegions;
    btnSave.disabled   = regionsBusy || !haveRegions;
    btnRevert.disabled = loadingRegions;
    btnAdd.disabled    = regionsBusy || !imageReady;

    setFileBtnEnabled(btnFileSave, !regionsBusy && haveRegions);
    setFileBtnEnabled(btnFileLoad, !loadingRegions);
  }

  function updateDispRect() {
    const stageRect = card.getBoundingClientRect();
    const imgRect = photo.getBoundingClientRect();

    dispRect = {
      x: imgRect.left - stageRect.left,
      y: imgRect.top  - stageRect.top,
      w: imgRect.width,
      h: imgRect.height,
      stageW: stageRect.width,
      stageH: stageRect.height,
    };

    const dpr = window.devicePixelRatio || 1;
    overlay.width  = Math.max(1, Math.round(stageRect.width * dpr));
    overlay.height = Math.max(1, Math.round(stageRect.height * dpr));
    overlay.style.width = `${stageRect.width}px`;
    overlay.style.height = `${stageRect.height}px`;

    const ctx = overlay.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function imageToCanvas(p) {
    const sx = dispRect.w / imgW;
    const sy = dispRect.h / imgH;
    return { x: dispRect.x + p.x * sx, y: dispRect.y + p.y * sy };
  }

  function ensureMinSizes(r) {
    r.geometry.width = Math.max(64, Math.round(r.geometry.width));
    r.geometry.height = Math.max(32, Math.round(r.geometry.height));
  }

  function uniqueRegionName() {
    let n = 0;
    while (true) {
      const name = `region_${n}`;
      if (!regions.some(r => r.name === name)) return name;
      n++;
    }
  }

  function buildRegionSelect() {
    regionSelect.innerHTML = '';
    regions.forEach((r, idx) => {
      const opt = document.createElement('option');
      opt.value = String(idx);
      opt.textContent = `${idx}: ${r.name}`;
      regionSelect.appendChild(opt);
    });
    if (regions.length) regionSelect.value = String(selected);
  }

  function syncSelectedToFields() {
    if (!regions.length) return;
    regionSelect.value = String(selected);
    regionName.value = regions[selected].name ?? '';
    regionDesc.value = regions[selected].description ?? '';
  }

  function selectIndex(i) {
    if (!regions.length) return;
    selected = ((i % regions.length) + regions.length) % regions.length;
    syncSelectedToFields();
    redraw();
  }

  function getCssVar(name, fallback) {
    const v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    return v || fallback;
  }

  // ---------- Drawing ----------
  function redraw() {
    updateDispRect();
    const ctx = overlay.getContext('2d');
    const stageRect = card.getBoundingClientRect();
    ctx.clearRect(0, 0, stageRect.width, stageRect.height);

    if (!imageReady || !regions.length || !imgW || !imgH) return;

    // Draw non-selected back-to-front; selected last.
    const indices = regions.map((_, i) => i).sort((a,b) => b-a);
    const ordered = indices.filter(i => i !== selected).concat(selected);

    for (const i of ordered) drawRegion(ctx, regions[i], i, i === selected);
  }

  function drawRegion(ctx, r, idx, isSelected) {
    const g = r.geometry;
    const color = isSelected ? getCssVar('--wire-selected', 'rgba(255,220,70,0.98)')
                             : getCssVar('--wire', 'rgba(200,200,200,0.95)');
    const outline = getCssVar('--wire-outline', 'rgba(0,0,0,0.85)');
    const wCol = parseFloat(getCssVar('--wire-width', '2.25')) || 2.25;
    const wOut = parseFloat(getCssVar('--wire-outline-width', '4.75')) || 4.75;

    const theta = -rad(g.rotation_deg || 0);

    const c = imageToCanvas({x: g.cx, y: g.cy});
    const sx = dispRect.w / imgW;
    const sy = dispRect.h / imgH;
    const wDisp = g.width * sx;
    const hDisp = g.height * sy;

    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(theta);

    // Index label (square corners) UNDER the wireframe
    const label = String(idx);
    const boxH = Math.max(8, Math.min(16, 0.5 * hDisp));
    const padX = Math.max(2, Math.round(boxH * 0.25));
    const fontPx = Math.max(9, Math.round(boxH * 0.70));
    ctx.font = `${fontPx}px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif`;
    ctx.textBaseline = 'middle';

    const textW = ctx.measureText(label).width;
    const boxW = Math.min(textW + 2*padX, Math.max(1, wDisp));

    const x0 = -wDisp/2;
    const y0 = -hDisp/2;

    ctx.beginPath();
    ctx.rect(x0, y0, boxW, boxH);
    ctx.fillStyle = color; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = outline; ctx.stroke();

    ctx.save();
    ctx.beginPath();
    ctx.rect(x0, y0, boxW, boxH);
    ctx.clip();
    ctx.fillStyle = '#000';
    ctx.fillText(label, x0 + padX, y0 + boxH/2);
    ctx.restore();

    // Wireframe on top
    ctx.beginPath();
    ctx.rect(-wDisp/2, -hDisp/2, wDisp, hDisp);
    ctx.strokeStyle = outline; ctx.lineWidth = wOut; ctx.lineJoin = 'round'; ctx.stroke();
    ctx.strokeStyle = color;   ctx.lineWidth = wCol; ctx.stroke();

    if (isSelected) drawHandles(ctx, wDisp, hDisp, color, outline);

    ctx.restore();
  }

  function drawHandles(ctx, wDisp, hDisp, color, outline) {
    const size = 12;
    const half = size/2;
    const rotR = 7;
    const rotOffset = 22;

    const pts = [
      {k:'nw', x:-wDisp/2, y:-hDisp/2},
      {k:'n',  x:0,        y:-hDisp/2},
      {k:'ne', x:wDisp/2,  y:-hDisp/2},
      {k:'e',  x:wDisp/2,  y:0},
      {k:'se', x:wDisp/2,  y:hDisp/2},
      {k:'s',  x:0,        y:hDisp/2},
      {k:'sw', x:-wDisp/2, y:hDisp/2},
      {k:'w',  x:-wDisp/2, y:0},
    ];

    for (const p of pts) {
      ctx.beginPath();
      ctx.rect(p.x - half, p.y - half, size, size);
      ctx.fillStyle = color; ctx.fill();
      ctx.lineWidth = 2; ctx.strokeStyle = outline; ctx.stroke();
    }

    // rotation circle above top edge (in local coords)
    ctx.beginPath();
    ctx.arc(0, -hDisp/2 - rotOffset, rotR, 0, Math.PI*2);
    ctx.fillStyle = color; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = outline; ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0, -hDisp/2);
    ctx.lineTo(0, -hDisp/2 - rotOffset + rotR);
    ctx.strokeStyle = outline; ctx.lineWidth = 2; ctx.stroke();
  }

  // ---------- Hit testing (DISPLAY pixels) ----------
  function localFromCanvas(pCanvas, g) {
    const c = imageToCanvas({x:g.cx, y:g.cy});
    const theta = -rad(g.rotation_deg || 0);
    const dx = pCanvas.x - c.x;
    const dy = pCanvas.y - c.y;
    const lx = dx*Math.cos(theta) - dy*Math.sin(theta);
    const ly = dx*Math.sin(theta) + dy*Math.cos(theta);

    const sx = dispRect.w / imgW;
    const sy = dispRect.h / imgH;
    const wDisp = g.width * sx;
    const hDisp = g.height * sy;

    return { lx, ly, wDisp, hDisp, c, theta, sx, sy };
  }

  function hitTest(pCanvas, g) {
    // Returns {mode, handle?} or null. Handles are active even if outside box.
    const {lx, ly, wDisp, hDisp} = localFromCanvas(pCanvas, g);
    const size = 12;
    const half = size/2;
    const rotR = 7;
    const rotOffset = 22;

    // Rotation
    const rx = 0, ry = -hDisp/2 - rotOffset;
    if ((lx-rx)*(lx-rx) + (ly-ry)*(ly-ry) <= rotR*rotR) return {mode:'rotate'};

    // Resize (8 squares)
    const handles = [
      {k:'nw', x:-wDisp/2, y:-hDisp/2},
      {k:'n',  x:0,        y:-hDisp/2},
      {k:'ne', x:wDisp/2,  y:-hDisp/2},
      {k:'e',  x:wDisp/2,  y:0},
      {k:'se', x:wDisp/2,  y:hDisp/2},
      {k:'s',  x:0,        y:hDisp/2},
      {k:'sw', x:-wDisp/2, y:hDisp/2},
      {k:'w',  x:-wDisp/2, y:0},
    ];

    // Prefer corners/edges before move (so you can grab outside-box parts of the handle)
    for (const h of handles) {
      if (Math.abs(lx - h.x) <= half && Math.abs(ly - h.y) <= half) return {mode:'resize', handle:h.k};
    }

    // Move: inside rectangle (epsilon)
    const eps = 0.5;
    if (Math.abs(lx) <= wDisp/2 + eps && Math.abs(ly) <= hDisp/2 + eps) return {mode:'move'};
    return null;
  }

  function pickInteractionTarget(pCanvas) {
    if (!regions.length) return null;

    // 1) Selected region has priority if any hit
    const selG = regions[selected]?.geometry;
    if (selG) {
      const ht = hitTest(pCanvas, selG);
      if (ht) return { index: selected, hit: ht };
    }

    // 2) Otherwise choose closest center among any hits, preferring handle hits over move hits
    const handleHits = [];
    const moveHits = [];

    for (let i=0;i<regions.length;i++) {
      const g = regions[i].geometry;
      const ht = hitTest(pCanvas, g);
      if (!ht) continue;
      const c = imageToCanvas({x:g.cx, y:g.cy});
      const d = (c.x - pCanvas.x)*(c.x - pCanvas.x) + (c.y - pCanvas.y)*(c.y - pCanvas.y);
      if (ht.mode === 'resize' || ht.mode === 'rotate') handleHits.push({i, ht, d});
      else moveHits.push({i, ht, d});
    }

    if (handleHits.length) {
      handleHits.sort((a,b)=>a.d-b.d);
      return { index: handleHits[0].i, hit: handleHits[0].ht };
    }
    if (moveHits.length) {
      moveHits.sort((a,b)=>a.d-b.d);
      return { index: moveHits[0].i, hit: moveHits[0].ht };
    }
    return null;
  }

  function pickRegionForSelect(pCanvas) {
    // For click-to-select: allow inside-box selection anywhere (even outside image).
    if (!regions.length) return null;
    const inside = [];
    for (let i=0;i<regions.length;i++) {
      const g = regions[i].geometry;
      const {lx, ly, wDisp, hDisp} = localFromCanvas(pCanvas, g);
      if (Math.abs(lx) <= wDisp/2 && Math.abs(ly) <= hDisp/2) inside.push(i);
    }
    if (!inside.length) return null;
    if (inside.includes(selected)) return selected;
    let best = inside[0], bestD = Infinity;
    for (const i of inside) {
      const g = regions[i].geometry;
      const c = imageToCanvas({x:g.cx, y:g.cy});
      const d = (c.x - pCanvas.x)*(c.x - pCanvas.x) + (c.y - pCanvas.y)*(c.y - pCanvas.y);
      if (d < bestD) { bestD = d; best = i; }
    }
    return best;
  }

  // ---------- API ----------
  async function loadRegionsFromServer() {
    loadingRegions = true; renderToolbar();
    try {
      const res = await fetch('/api/v1/regions', { cache: 'no-store' });
      if (!res.ok) throw new Error();
      const data = await res.json();
      const rr = Array.isArray(data.regions) ? data.regions : [];
      regions = rr.map(r => ({
        name: String(r.name ?? ''),
        description: String(r.description ?? ''),
        geometry: {
          cx: Number(r.geometry?.cx ?? 0),
          cy: Number(r.geometry?.cy ?? 0),
          width: Number(r.geometry?.width ?? 64),
          height: Number(r.geometry?.height ?? 32),
          rotation_deg: Number(r.geometry?.rotation_deg ?? 0),
        }
      }));
      regions.forEach(ensureMinSizes);
      selected = 0;
      buildRegionSelect();
      syncSelectedToFields();
      setDirty(false);
    } catch (_) {
    } finally {
      loadingRegions = false; renderToolbar(); redraw();
    }
  }

  async function saveRegionsToServer() {
    if (!regions.length) return;
    savingRegions = true; renderToolbar();
    try {
      const body = JSON.stringify({ regions: regions.map(r => ({
        name: r.name,
        description: r.description,
        geometry: {
          cx: r.geometry.cx,
          cy: r.geometry.cy,
          width: Math.round(r.geometry.width),
          height: Math.round(r.geometry.height),
          rotation_deg: r.geometry.rotation_deg,
        }
      }))});
      const res = await fetch('/api/v1/regions', {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body
      });
      if (!res.ok) throw new Error();
      setDirty(false);
    } catch (_) {
    } finally {
      savingRegions = false; renderToolbar(); redraw();
    }
  }

  async function loadImageFromServer() {
    loadingImage = true; renderToolbar(); setSpinner(true);
    try {
      const res = await fetch('/api/v1/images/full?new_capture=true&wait=true', { cache: 'no-store' });
      if (!res.ok) throw new Error();
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      photo.onload = () => {
        try { URL.revokeObjectURL(url); } catch {}
        imageReady = true;
        imgW = photo.naturalWidth || 0;
        imgH = photo.naturalHeight || 0;
        updateDispRect();
        redraw();
        renderToolbar();
      };
      photo.src = url;
      lastRefresh.textContent = nowLocalString(new Date());
    } catch (_) {
    } finally {
      loadingImage = false; setSpinner(false); renderToolbar();
    }
  }

  // ---------- File Save/Load ----------
  function doFileSave() {
    if (!regions.length) return;
    const data = {
      regions: regions.map(r => ({
        name: r.name,
        description: r.description,
        geometry: {
          cx: r.geometry.cx,
          cy: r.geometry.cy,
          width: Math.round(r.geometry.width),
          height: Math.round(r.geometry.height),
          rotation_deg: r.geometry.rotation_deg,
        }
      }))
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const stamp = new Date();
    const y = stamp.getFullYear();
    const m = String(stamp.getMonth()+1).padStart(2,'0');
    const d = String(stamp.getDate()).padStart(2,'0');
    const hh = String(stamp.getHours()).padStart(2,'0');
    const mm = String(stamp.getMinutes()).padStart(2,'0');
    a.download = `regions-${y}${m}${d}-${hh}${mm}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 250);
  }

  function doFileLoad(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const obj = JSON.parse(String(reader.result || ''));
        const rr = Array.isArray(obj.regions) ? obj.regions : [];
        regions = rr.map(r => ({
          name: String(r.name ?? ''),
          description: String(r.description ?? ''),
          geometry: {
            cx: Number(r.geometry?.cx ?? 0),
            cy: Number(r.geometry?.cy ?? 0),
            width: Number(r.geometry?.width ?? 64),
            height: Number(r.geometry?.height ?? 32),
            rotation_deg: Number(r.geometry?.rotation_deg ?? 0),
          }
        }));
        regions.forEach(ensureMinSizes);
        selected = 0;
        buildRegionSelect();
        syncSelectedToFields();
        setDirty(true);
        renderToolbar();
        redraw();
      } catch (_) {}
    };
    reader.readAsText(file);
  }

  // ---------- UI actions ----------
  btnRefresh.addEventListener('click', () => { if (!loadingImage) loadImageFromServer(); });

  btnPrev.addEventListener('click', () => selectIndex(selected - 1));
  btnNext.addEventListener('click', () => selectIndex(selected + 1));

  btnAdd.addEventListener('click', () => {
    if (!imageReady || !imgW || !imgH) return;
    const name = uniqueRegionName();
    const w = Math.max(64, Math.round(imgW * 0.20));
    const h = Math.max(32, Math.round(imgH * 0.20));
    regions.push({
      name,
      description: "",
      geometry: { cx: imgW/2, cy: imgH/2, width: w, height: h, rotation_deg: 0 }
    });
    selected = regions.length - 1;
    buildRegionSelect();
    syncSelectedToFields();
    setDirty(true);
    renderToolbar();
    redraw();
  });

  btnDel.addEventListener('click', () => {
    if (!regions.length) return;
    const del = selected;
    regions.splice(del, 1);
    selected = regions.length ? Math.min(del, regions.length - 1) : 0;
    buildRegionSelect();
    syncSelectedToFields();
    setDirty(true);
    renderToolbar();
    redraw();
  });

  btnSave.addEventListener('click', () => { if (!savingRegions) saveRegionsToServer(); });
  btnRevert.addEventListener('click', () => { if (!loadingRegions) loadRegionsFromServer(); });

  regionSelect.addEventListener('change', () => {
    const i = Number(regionSelect.value);
    if (Number.isFinite(i)) selectIndex(i);
  });

  function validateName(s) { return /^[A-Za-z_][A-Za-z0-9_]*$/.test(s); }

  regionName.addEventListener('input', () => {
    if (!regions.length) return;
    const s = regionName.value;
    if (!validateName(s)) return;
    regions[selected].name = s;
    buildRegionSelect();
    setDirty(true);
    redraw();
  });

  regionDesc.addEventListener('input', () => {
    if (!regions.length) return;
    regions[selected].description = regionDesc.value;
    setDirty(true);
  });

  btnFileSave.addEventListener('click', () => { if (!btnFileSave.classList.contains('disabled')) doFileSave(); });
  btnFileLoad.addEventListener('click', () => {
    if (btnFileLoad.classList.contains('disabled')) return;
    fileInput.value = '';
    fileInput.click();
  });
  fileInput.addEventListener('change', () => doFileLoad(fileInput.files?.[0]));

  window.addEventListener('keydown', (e) => {
    if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.isContentEditable)) return;
    if (e.key === 'ArrowLeft') { e.preventDefault(); selectIndex(selected - 1); }
    if (e.key === 'ArrowRight'){ e.preventDefault(); selectIndex(selected + 1); }
  });

  // ---------- Pointer interaction ----------
  overlay.addEventListener('pointerdown', (e) => {
    if (!imageReady || !dispRect || !regions.length) return;

    const rect = card.getBoundingClientRect();
    const pCanvas = { x: e.clientX - rect.left, y: e.clientY - rect.top };

    const tgt = pickInteractionTarget(pCanvas);
    if (!tgt) return;

    if (tgt.index !== selected) {
      selected = tgt.index;
      buildRegionSelect();
      syncSelectedToFields();
      redraw();
    }

    const g = regions[selected].geometry;
    const ht = tgt.hit;

    drag = {
      mode: ht.mode,
      handle: ht.handle || null,
      startCanvas: {x: pCanvas.x, y: pCanvas.y},
      centerCanvas0: imageToCanvas({x:g.cx, y:g.cy}),
      g0: JSON.parse(JSON.stringify(g)),
      rot0: Number(g.rotation_deg || 0),
      ang0: 0,
      pointerId: e.pointerId
    };

    if (ht.mode === 'rotate') {
      const c0 = drag.centerCanvas0;
      const dx = pCanvas.x - c0.x;
      const dy = pCanvas.y - c0.y;
      drag.ang0 = Math.atan2(-dy, dx);
    }

    overlay.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  overlay.addEventListener('pointermove', (e) => {
    if (!drag || e.pointerId !== drag.pointerId || !regions.length) return;

    const rect = card.getBoundingClientRect();
    const pCanvas = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    const g = regions[selected].geometry;
    const g0 = drag.g0;

    const sxInv = imgW / dispRect.w;
    const syInv = imgH / dispRect.h;

    if (drag.mode === 'move') {
      const dx = pCanvas.x - drag.startCanvas.x;
      const dy = pCanvas.y - drag.startCanvas.y;
      g.cx = g0.cx + dx * sxInv;
      g.cy = g0.cy + dy * syInv;
      setDirty(true);
      redraw();
      return;
    }

    if (drag.mode === 'rotate') {
      const c0 = drag.centerCanvas0;
      const dx = pCanvas.x - c0.x;
      const dy = pCanvas.y - c0.y;
      const ang = Math.atan2(-dy, dx);
      const delta = ang - drag.ang0;
      g.rotation_deg = drag.rot0 + deg(delta);
      setDirty(true);
      redraw();
      return;
    }

    if (drag.mode === 'resize') {
      // Symmetric resize around center in region-local DISPLAY coordinates
      const theta0 = -rad(g0.rotation_deg || 0);
      const c0 = drag.centerCanvas0;
      const ddx = pCanvas.x - c0.x;
      const ddy = pCanvas.y - c0.y;
      const lx = ddx*Math.cos(theta0) - ddy*Math.sin(theta0);
      const ly = ddx*Math.sin(theta0) + ddy*Math.cos(theta0);

      const sx = dispRect.w / imgW;
      const sy = dispRect.h / imgH;

      const wDisp0 = g0.width * sx;
      const hDisp0 = g0.height * sy;

      let wDisp = wDisp0;
      let hDisp = hDisp0;

      const ax = Math.abs(lx);
      const ay = Math.abs(ly);

      const h = drag.handle;
      if (h === 'e' || h === 'w') {
        wDisp = Math.max(2 * ax, 2);
        hDisp = hDisp0;
      } else if (h === 'n' || h === 's') {
        hDisp = Math.max(2 * ay, 2);
        wDisp = wDisp0;
      } else {
        wDisp = Math.max(2 * ax, 2);
        hDisp = Math.max(2 * ay, 2);
      }

      g.width  = Math.max(64, Math.round(wDisp / sx));
      g.height = Math.max(32, Math.round(hDisp / sy));
      setDirty(true);
      redraw();
      return;
    }
  });

  overlay.addEventListener('pointerup', (e) => {
    if (!drag || e.pointerId !== drag.pointerId) return;
    drag = null;
    try { overlay.releasePointerCapture(e.pointerId); } catch {}
  });
  overlay.addEventListener('pointercancel', (e) => {
    if (!drag || e.pointerId !== drag.pointerId) return;
    drag = null;
    try { overlay.releasePointerCapture(e.pointerId); } catch {}
  });

  overlay.addEventListener('click', (e) => {
    if (drag) return;
    if (!imageReady || !dispRect || !regions.length) return;
    const rect = card.getBoundingClientRect();
    const pCanvas = { x: e.clientX - rect.left, y: e.clientY - rect.top };

    // Prefer handle target for selection too
    const tgt = pickInteractionTarget(pCanvas);
    if (tgt) {
      selectIndex(tgt.index);
      return;
    }
    const pick = pickRegionForSelect(pCanvas);
    if (pick !== null) selectIndex(pick);
  });

  window.addEventListener('resize', () => redraw());
  photo.addEventListener('load', () => redraw());

  // ---------- Initial load ----------
  function init() {
    lastRefresh.textContent = '';
    renderToolbar();

    btnFileSave.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); btnFileSave.click(); }});
    btnFileLoad.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); btnFileLoad.click(); }});

    loadRegionsFromServer();
    loadImageFromServer();
  }
  init();
})();
</script>
</body>
</html>
