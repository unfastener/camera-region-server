<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Camera Region Editor</title>
  <style>
    :root{
      --gap: 16px;
      --fg: #fff;
      --bg: #292929;
      --button-fg: #ddd;
      --button-bg: rgb(30,30,30);
      --button-bg-disabled: rgb(22,22,22);
      --button-fg-disabled: #666;
      --drop-shadow: 0 8px 20px rgba(0,0,0,0.35);
      --stream-bg: #000;

      --wire: rgba(200,200,200,0.95);
      --wire-selected: rgba(255,220,70,0.98);
      --wire-outline: rgba(0,0,0,0.85);
      --wire-width: 2.25;
      --wire-outline-width: 4.75;
      --label-font: 13px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      --label-pad: 6;
      --label-radius: 6;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .page{
      min-height: 100%;
      display:flex;
      flex-direction:column;
      box-sizing:border-box;
      padding:var(--gap);
      gap:var(--gap);
    }

    .toolbar{
      display:grid;
      grid-template-columns: auto 1fr auto;
      align-items:center;
      gap: var(--gap);
    }

    .logo{
      height: calc(2 * 42px + 8px);
      width: 220px;
      max-width: 28vw;
      border-radius: 12px;
      box-shadow: var(--drop-shadow);
      background: url("/logo.png") no-repeat center / contain;
      background-color: rgba(0,0,0,0.15);
      user-select:none;
    }

    .controls{
      display:grid;
      grid-template-columns: 1fr;
      gap: 8px;
      min-width: 0;
    }

    .row{
      display:flex;
      align-items:center;
      gap: 10px;
      min-width:0;
      flex-wrap: nowrap;
    }

    .row .spacer{ flex: 1; }

    button, input, select, label.filebtn{
      border: 1px solid rgba(255,255,255,0.10);
      background: var(--button-bg);
      color: var(--button-fg);
      border-radius: 12px;
      box-shadow: var(--drop-shadow);
      padding: 10px 12px;
      font: 600 14px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      letter-spacing: 0.2px;
      outline: none;
      transition: transform 80ms ease, opacity 80ms ease, border-color 120ms ease;
    }

    button:hover:not(:disabled), label.filebtn:hover{
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.22);
      cursor:pointer;
    }

    button:active:not(:disabled), label.filebtn:active{
      transform: translateY(0px);
      opacity: 0.9;
    }

    button:disabled, input:disabled, select:disabled, label.filebtn.disabled{
      background: var(--button-bg-disabled);
      color: var(--button-fg-disabled);
      box-shadow: none;
      border-color: rgba(255,255,255,0.06);
      cursor:not-allowed;
      transform:none;
      opacity: 0.9;
    }

    input, select{
      font-weight: 500;
      padding: 10px 10px;
      min-width: 0;
    }

    .small{
      font: 12px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      opacity: 0.85;
      user-select:none;
      white-space: nowrap;
    }

    .regionpicker{
      display:flex;
      gap: 10px;
      align-items:center;
      min-width: 0;
      flex: 1;
    }

    #regionSelect{
      width: 210px;
      max-width: 20vw;
    }
    #regionName{ flex: 1; min-width: 0; }
    #regionDesc{ flex: 1; min-width: 0; }

    .wrap{
      flex:1;
      display:flex;
      align-items: stretch;
      justify-content:center;
      min-height: 0;
    }

    .card{
      position:relative;
      width: 100%;
      max-width: 1800px;
      border-radius: 12px;
      overflow:hidden;
      box-shadow: var(--drop-shadow);
      background: var(--stream-bg);
      user-select:none;
      min-height: 0;
    }

    .stage{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background: #111;
    }

    img#photo{
      max-width:100%;
      max-height:100%;
      width:auto;
      height:auto;
      display:block;
      object-fit: contain;
      user-select:none;
      -webkit-user-drag: none;
      pointer-events:none;
    }

    canvas#overlay{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:auto;
      touch-action:none;
    }

    .spinner{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(1px);
    }
    .spinner.show{ display:flex; }
    .spin{
      width: 60px;
      height: 60px;
      animation: rot 1.0s linear infinite;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.5));
      opacity: 0.95;
    }
    @keyframes rot { from { transform: rotate(0deg); } to { transform: rotate(360deg);} }

    .hint{
      position:absolute;
      left: 12px;
      bottom: 10px;
      font: 12px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      opacity: 0.65;
      user-select:none;
      pointer-events:none;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    input[type="file"]{ display:none; }
  </style>
</head>
<body>
  <div class="page">
    <div class="toolbar">
      <div class="logo" aria-label="Logo"></div>

      <div class="controls">
        <div class="row">
          <button id="btnRefresh">Refresh</button>
          <div class="small" id="lastRefresh">&nbsp;</div>

          <div class="regionpicker">
            <select id="regionSelect" disabled></select>
            <input id="regionName" type="text" placeholder="region_name" disabled />
          </div>

          <button id="btnNext" disabled>Next</button>
          <button id="btnAdd" disabled>Add</button>
          <button id="btnSave" disabled>Save</button>

          <label class="filebtn disabled" id="btnFileSave" title="Save regions to a file">
            File Save
          </label>
        </div>

        <div class="row">
          <div class="spacer"></div>
          <input id="regionDesc" type="text" placeholder="Description" disabled />

          <button id="btnPrev" disabled>Prev</button>
          <button id="btnDel" disabled>Del</button>
          <button id="btnRevert" disabled>Revert</button>

          <label class="filebtn disabled" id="btnFileLoad" title="Load regions from a file">
            File Load
          </label>
          <input id="fileInput" type="file" accept="application/json,.json" />
        </div>
      </div>

      <div></div>
    </div>

    <div class="wrap">
      <div class="card" id="card">
        <div class="stage" id="stage">
          <img id="photo" alt="Camera capture" />
          <canvas id="overlay"></canvas>

          <div class="spinner" id="spinner" aria-label="Loading">
            <!-- Easily replaceable spinner asset -->
            <svg class="spin" viewBox="0 0 50 50" aria-hidden="true">
              <circle cx="25" cy="25" r="20" fill="none" stroke="white" stroke-opacity="0.25" stroke-width="5"></circle>
              <path d="M45 25a20 20 0 0 1-20 20" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"></path>
            </svg>
          </div>

          <div class="hint">Drag inside region to move. Drag handles to resize/rotate.</div>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  // ---------- DOM ----------
  const btnRefresh = document.getElementById('btnRefresh');
  const btnPrev    = document.getElementById('btnPrev');
  const btnNext    = document.getElementById('btnNext');
  const btnAdd     = document.getElementById('btnAdd');
  const btnDel     = document.getElementById('btnDel');
  const btnSave    = document.getElementById('btnSave');
  const btnRevert  = document.getElementById('btnRevert');
  const btnFileSave= document.getElementById('btnFileSave');
  const btnFileLoad= document.getElementById('btnFileLoad');

  const lastRefresh = document.getElementById('lastRefresh');

  const regionSelect= document.getElementById('regionSelect');
  const regionName  = document.getElementById('regionName');
  const regionDesc  = document.getElementById('regionDesc');

  const fileInput   = document.getElementById('fileInput');

  const photo       = document.getElementById('photo');
  const overlay     = document.getElementById('overlay');
  const spinner     = document.getElementById('spinner');
  const card        = document.getElementById('card');

  // ---------- State ----------
  let imageReady = false;
  let imgW = 0, imgH = 0;          // natural image pixels
  let dispRect = null;             // displayed image rect within card, in CSS pixels

  let regions = [];                // {name, description, geometry:{cx,cy,width,height,rotation_deg}}
  let selected = 0;
  let dirty = false;

  let loadingImage = false;
  let loadingRegions = false;
  let savingRegions = false;

  // Drag state:
  // { mode:'move'|'rotate'|'resize', handle, pointerId, startCanvas, startImg, g0, anchorLocal }
  let drag = null;

  // ---------- Helpers ----------
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  const rad = (deg) => deg * Math.PI / 180;
  const deg = (r) => r * 180 / Math.PI;

  function nowLocalString(d) {
    const pad2 = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
  }

  function setSpinner(on) { spinner.classList.toggle('show', !!on); }

  function setDirty(v) { dirty = !!v; renderToolbar(); }

  function setFileBtnEnabled(labelEl, enabled) {
    labelEl.classList.toggle('disabled', !enabled);
    labelEl.tabIndex = enabled ? 0 : -1;
    labelEl.setAttribute('aria-disabled', enabled ? 'false' : 'true');
  }

  function renderToolbar() {
    btnSave.textContent = (dirty ? "• Save" : "Save");
    btnRefresh.disabled = loadingImage;

    const haveRegions = regions.length > 0;
    const regionsBusy = loadingRegions || savingRegions;

    regionSelect.disabled = regionsBusy || !haveRegions;
    regionName.disabled   = regionsBusy || !haveRegions;
    regionDesc.disabled   = regionsBusy || !haveRegions;

    btnPrev.disabled   = regionsBusy || !haveRegions;
    btnNext.disabled   = regionsBusy || !haveRegions;
    btnDel.disabled    = regionsBusy || !haveRegions;
    btnSave.disabled   = regionsBusy || !haveRegions;
    btnRevert.disabled = !!loadingRegions;

    btnAdd.disabled    = regionsBusy || !imageReady;

    setFileBtnEnabled(btnFileSave, !regionsBusy && haveRegions);
    setFileBtnEnabled(btnFileLoad, !loadingRegions);
  }

  function imageToCanvas(p) {
    if (!dispRect) return {x:0,y:0};
    const sx = dispRect.w / imgW;
    const sy = dispRect.h / imgH;
    return { x: dispRect.x + p.x * sx, y: dispRect.y + p.y * sy };
  }

  function canvasToImage(p) {
    if (!dispRect) return {x:0,y:0};
    const sx = imgW / dispRect.w;
    const sy = imgH / dispRect.h;
    return { x: (p.x - dispRect.x) * sx, y: (p.y - dispRect.y) * sy };
  }

  function updateDispRect() {
    const stageRect = card.getBoundingClientRect();
    const imgRect = photo.getBoundingClientRect();

    dispRect = {
      x: imgRect.left - stageRect.left,
      y: imgRect.top  - stageRect.top,
      w: imgRect.width,
      h: imgRect.height,
      stageW: stageRect.width,
      stageH: stageRect.height,
    };

    const dpr = window.devicePixelRatio || 1;
    overlay.width  = Math.max(1, Math.round(stageRect.width * dpr));
    overlay.height = Math.max(1, Math.round(stageRect.height * dpr));
    overlay.style.width = `${stageRect.width}px`;
    overlay.style.height = `${stageRect.height}px`;

    const ctx = overlay.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function ensureMinSizes(r) {
    const g = r.geometry;
    g.width = Math.max(64, Math.round(g.width));
    g.height = Math.max(32, Math.round(g.height));
  }

  function uniqueRegionName() {
    let n = 0;
    while (true) {
      const name = `region_${n}`;
      if (!regions.some(r => r.name === name)) return name;
      n++;
    }
  }

  function selectIndex(i) {
    if (!regions.length) return;
    selected = ((i % regions.length) + regions.length) % regions.length;
    syncSelectedToFields();
    redraw();
  }

  function syncSelectedToFields() {
    if (!regions.length) return;
    regionSelect.value = String(selected);
    regionName.value = regions[selected].name ?? '';
    regionDesc.value = regions[selected].description ?? '';
  }

  function buildRegionSelect() {
    regionSelect.innerHTML = '';
    regions.forEach((r, idx) => {
      const opt = document.createElement('option');
      opt.value = String(idx);
      opt.textContent = `${idx}: ${r.name}`;
      regionSelect.appendChild(opt);
    });
    if (regions.length) regionSelect.value = String(selected);
  }

  function getCssVar(name, fallback) {
    const v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    return v || fallback;
  }

  // ---------- Geometry ----------
  function regionCornersImage(g) {
    const cx = g.cx, cy = g.cy, w = g.width, h = g.height;
    const th = -rad(g.rotation_deg || 0);
    const c = Math.cos(th), s = Math.sin(th);
    const pts = [
      {x:-w/2, y:-h/2}, // TL (local)
      {x: w/2, y:-h/2}, // TR
      {x: w/2, y: h/2}, // BR
      {x:-w/2, y: h/2}, // BL
    ];
    return pts.map(p => ({ x: cx + p.x*c - p.y*s, y: cy + p.x*s + p.y*c }));
  }

  function pointInRegionImage(px, py, g) {
    const th = -rad(g.rotation_deg || 0);
    const dx = px - g.cx, dy = py - g.cy;
    const lx = dx*Math.cos(th) - dy*Math.sin(th);
    const ly = dx*Math.sin(th) + dy*Math.cos(th);
    return (Math.abs(lx) <= g.width/2) && (Math.abs(ly) <= g.height/2);
  }

  function pickRegionAtImage(px, py) {
    if (!regions.length) return null;
    const inside = [];
    for (let i=0;i<regions.length;i++) {
      if (pointInRegionImage(px, py, regions[i].geometry)) inside.push(i);
    }
    if (!inside.length) return null;
    if (inside.includes(selected)) return selected;
    let best = inside[0], bestD = Infinity;
    for (const i of inside) {
      const g = regions[i].geometry;
      const d = (g.cx - px)*(g.cx - px) + (g.cy - py)*(g.cy - py);
      if (d < bestD) { bestD = d; best = i; }
    }
    return best;
  }

  // Handles: common model:
  // - 8 resize handles at corners + edge midpoints
  // - 1 rotation handle above top edge midpoint, connected with a line
  const HANDLE_R = 10;      // px hit radius
  const ROT_OFFSET = 28;    // px from top edge midpoint outward

  function getHandlesCanvas(g) {
    const cornersImg = regionCornersImage(g); // TL,TR,BR,BL in that order
    const corners = cornersImg.map(imageToCanvas);
    const [tl,tr,br,bl] = corners;

    const mid = (a,b)=>({x:(a.x+b.x)/2, y:(a.y+b.y)/2});
    const tm = mid(tl,tr);
    const rm = mid(tr,br);
    const bm = mid(br,bl);
    const lm = mid(bl,tl);

    // outward normal from top edge (tl->tr): rotate edge dir left
    const ex = tr.x - tl.x, ey = tr.y - tl.y;
    const el = Math.hypot(ex,ey) || 1;
    const nx = -ey/el, ny = ex/el; // this points "outward" relative to point order (TL->TR)
    const rot = { x: tm.x + nx*ROT_OFFSET, y: tm.y + ny*ROT_OFFSET };

    return [
      {id:'tl', type:'resize', x:tl.x, y:tl.y, cursor:'nwse-resize', opp:'br'},
      {id:'tr', type:'resize', x:tr.x, y:tr.y, cursor:'nesw-resize', opp:'bl'},
      {id:'br', type:'resize', x:br.x, y:br.y, cursor:'nwse-resize', opp:'tl'},
      {id:'bl', type:'resize', x:bl.x, y:bl.y, cursor:'nesw-resize', opp:'tr'},

      {id:'tm', type:'resize', x:tm.x, y:tm.y, cursor:'ns-resize', opp:'bm'},
      {id:'rm', type:'resize', x:rm.x, y:rm.y, cursor:'ew-resize', opp:'lm'},
      {id:'bm', type:'resize', x:bm.x, y:bm.y, cursor:'ns-resize', opp:'tm'},
      {id:'lm', type:'resize', x:lm.x, y:lm.y, cursor:'ew-resize', opp:'rm'},

      {id:'rot', type:'rotate', x:rot.x, y:rot.y, cursor:'grab', ref:'tm', nx, ny}
    ];
  }

  function handleHitTest(pCanvas, g) {
    const hs = getHandlesCanvas(g);
    // Priority: rotation, then resize
    const rot = hs.find(h => h.id === 'rot');
    if (rot && (Math.hypot(pCanvas.x-rot.x, pCanvas.y-rot.y) <= HANDLE_R)) return rot;

    for (const h of hs) {
      if (h.type !== 'resize') continue;
      if (Math.hypot(pCanvas.x-h.x, pCanvas.y-h.y) <= HANDLE_R) return h;
    }
    return null;
  }

  function canvasToLocalImage(pCanvas, g0) {
    // Convert a canvas point into the region-local coordinates (image px) using g0 rotation and center.
    const pImg = canvasToImage(pCanvas);
    const th = -rad(g0.rotation_deg || 0);
    const dx = pImg.x - g0.cx, dy = pImg.y - g0.cy;
    return {
      x: dx*Math.cos(th) - dy*Math.sin(th),
      y: dx*Math.sin(th) + dy*Math.cos(th),
      pImg
    };
  }

  function localToImageDelta(pLocal, g0) {
    // Convert local (image px) delta into image delta using g0 rotation.
    const th = -rad(g0.rotation_deg || 0);
    const c = Math.cos(th), s = Math.sin(th);
    return { x: pLocal.x*c + pLocal.y*s, y: -pLocal.x*s + pLocal.y*c };
  }

  function localOfHandle(id, g0) {
    const w = g0.width, h = g0.height;
    const map = {
      tl:{x:-w/2,y:-h/2}, tr:{x:w/2,y:-h/2}, br:{x:w/2,y:h/2}, bl:{x:-w/2,y:h/2},
      tm:{x:0,y:-h/2}, rm:{x:w/2,y:0}, bm:{x:0,y:h/2}, lm:{x:-w/2,y:0}
    };
    return map[id] ? {x:map[id].x, y:map[id].y} : {x:0,y:0};
  }

  // ---------- Drawing ----------
  function redraw() {
    updateDispRect();
    const ctx = overlay.getContext('2d');
    const stageRect = card.getBoundingClientRect();
    ctx.clearRect(0, 0, stageRect.width, stageRect.height);

    if (!imageReady || !regions.length || !imgW || !imgH) return;

    const indices = regions.map((_, i) => i).sort((a,b) => b-a);
    const sel = selected;
    const ordered = indices.filter(i => i !== sel).concat(sel);

    for (const i of ordered) drawRegion(ctx, regions[i], i, i===sel);
  }

  function drawRegion(ctx, r, idx, isSelected) {
    const g = r.geometry;
    const color = isSelected ? getCssVar('--wire-selected', 'rgba(255,220,70,0.98)')
                             : getCssVar('--wire', 'rgba(200,200,200,0.95)');
    const outline = getCssVar('--wire-outline', 'rgba(0,0,0,0.85)');
    const wCol = parseFloat(getCssVar('--wire-width', '2.25')) || 2.25;
    const wOut = parseFloat(getCssVar('--wire-outline-width', '4.75')) || 4.75;

    const corners = regionCornersImage(g).map(imageToCanvas);

    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';

    ctx.beginPath();
    ctx.moveTo(corners[0].x, corners[0].y);
    for (let i=1;i<4;i++) ctx.lineTo(corners[i].x, corners[i].y);
    ctx.closePath();

    ctx.strokeStyle = outline;
    ctx.lineWidth = wOut;
    ctx.stroke();

    ctx.strokeStyle = color;
    ctx.lineWidth = wCol;
    ctx.stroke();

    // Label box: square corners, display-pixel sizing
    const label = String(idx);

    const c = imageToCanvas({x:g.cx,y:g.cy});
    const th = -rad(g.rotation_deg || 0);

    // Compute display size of region
    const sx = dispRect.w / imgW;
    const sy = dispRect.h / imgH;
    const wDisp = g.width * sx;
    const hDisp = g.height * sy;

    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(th);

    const boxH = Math.max(8, Math.min(16, 0.5 * hDisp));
    const padX = Math.max(2, Math.round(boxH * 0.25));
    const fontPx = Math.max(9, Math.round(boxH * 0.70));
    ctx.font = `${fontPx}px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif`;
    ctx.textBaseline = 'middle';

    const textW = ctx.measureText(label).width;
    let boxW = textW + 2*padX;
    boxW = Math.min(boxW, Math.max(1, wDisp));

    const x0 = -wDisp/2;
    const y0 = -hDisp/2;

    ctx.fillStyle = color;
    ctx.strokeStyle = outline;
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.rect(x0, y0, boxW, boxH);
    ctx.fill();
    ctx.stroke();

    ctx.save();
    ctx.beginPath();
    ctx.rect(x0, y0, boxW, boxH);
    ctx.clip();

    ctx.fillStyle = '#000';
    ctx.fillText(label, x0 + padX, y0 + boxH/2);
    ctx.restore();

    ctx.restore();

    if (isSelected) drawHandles(ctx, g, color, outline);
  }

  function drawHandles(ctx, g, color, outline) {
    const hs = getHandlesCanvas(g);
    const rot = hs.find(h => h.id==='rot');
    const tm  = hs.find(h => h.id==='tm');

    // Connector line to rotation handle
    if (rot && tm) {
      ctx.beginPath();
      ctx.moveTo(tm.x, tm.y);
      ctx.lineTo(rot.x, rot.y);
      ctx.strokeStyle = outline;
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(tm.x, tm.y);
      ctx.lineTo(rot.x, rot.y);
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Resize handles: squares
    for (const h of hs) {
      if (h.type !== 'resize') continue;
      const s = 10;
      ctx.beginPath();
      ctx.rect(h.x - s/2, h.y - s/2, s, s);
      ctx.fillStyle = color; ctx.fill();
      ctx.lineWidth = 2; ctx.strokeStyle = outline; ctx.stroke();
    }

    // Rotation handle: circle
    if (rot) {
      ctx.beginPath();
      ctx.arc(rot.x, rot.y, 7, 0, Math.PI*2);
      ctx.fillStyle = color; ctx.fill();
      ctx.lineWidth = 2; ctx.strokeStyle = outline; ctx.stroke();
    }
  }

  // ---------- API ----------
  async function loadRegionsFromServer() {
    loadingRegions = true;
    renderToolbar();
    try {
      const res = await fetch('/api/v1/regions', { cache: 'no-store' });
      if (!res.ok) throw new Error('regions fetch failed');
      const data = await res.json();
      const rr = Array.isArray(data.regions) ? data.regions : [];
      regions = rr.map(r => ({
        name: String(r.name ?? ''),
        description: String(r.description ?? ''),
        geometry: {
          cx: Number(r.geometry?.cx ?? 0),
          cy: Number(r.geometry?.cy ?? 0),
          width: Number(r.geometry?.width ?? 64),
          height: Number(r.geometry?.height ?? 32),
          rotation_deg: Number(r.geometry?.rotation_deg ?? 0),
        }
      }));
      regions.forEach(ensureMinSizes);
      selected = 0;
      buildRegionSelect();
      syncSelectedToFields();
      setDirty(false);
    } catch (_) {
      // no user-facing errors
    } finally {
      loadingRegions = false;
      renderToolbar();
      redraw();
    }
  }

  async function saveRegionsToServer() {
    if (!regions.length) return;
    savingRegions = true;
    renderToolbar();
    try {
      const body = JSON.stringify({ regions: regions.map(r => ({
        name: r.name,
        description: r.description,
        geometry: {
          cx: r.geometry.cx,
          cy: r.geometry.cy,
          width: Math.round(r.geometry.width),
          height: Math.round(r.geometry.height),
          rotation_deg: r.geometry.rotation_deg,
        }
      }))});
      const res = await fetch('/api/v1/regions', {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body
      });
      if (!res.ok) throw new Error('save failed');
      setDirty(false);
    } catch (_) {
    } finally {
      savingRegions = false;
      renderToolbar();
      redraw();
    }
  }

  async function loadImageFromServer() {
    loadingImage = true;
    renderToolbar();
    setSpinner(true);
    try {
      const res = await fetch('/api/v1/images/full?new_capture=true&wait=true', { cache: 'no-store' });
      if (!res.ok) throw new Error('image fetch failed');

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      photo.onload = () => {
        try { URL.revokeObjectURL(url); } catch {}
        imageReady = true;
        imgW = photo.naturalWidth || 0;
        imgH = photo.naturalHeight || 0;
        updateDispRect();
        redraw();
        renderToolbar();
      };
      photo.src = url;

      lastRefresh.textContent = nowLocalString(new Date());
    } catch (_) {
    } finally {
      loadingImage = false;
      setSpinner(false);
      renderToolbar();
    }
  }

  // ---------- File Save/Load ----------
  function doFileSave() {
    if (!regions.length) return;
    const data = {
      regions: regions.map(r => ({
        name: r.name,
        description: r.description,
        geometry: {
          cx: r.geometry.cx,
          cy: r.geometry.cy,
          width: Math.round(r.geometry.width),
          height: Math.round(r.geometry.height),
          rotation_deg: r.geometry.rotation_deg,
        }
      }))
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const stamp = new Date();
    const y = stamp.getFullYear();
    const m = String(stamp.getMonth()+1).padStart(2,'0');
    const d = String(stamp.getDate()).padStart(2,'0');
    const hh = String(stamp.getHours()).padStart(2,'0');
    const mm = String(stamp.getMinutes()).padStart(2,'0');
    a.download = `regions-${y}${m}${d}-${hh}${mm}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 250);
  }

  function doFileLoad(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const obj = JSON.parse(String(reader.result || ''));
        const rr = Array.isArray(obj.regions) ? obj.regions : [];
        regions = rr.map(r => ({
          name: String(r.name ?? ''),
          description: String(r.description ?? ''),
          geometry: {
            cx: Number(r.geometry?.cx ?? 0),
            cy: Number(r.geometry?.cy ?? 0),
            width: Number(r.geometry?.width ?? 64),
            height: Number(r.geometry?.height ?? 32),
            rotation_deg: Number(r.geometry?.rotation_deg ?? 0),
          }
        }));
        regions.forEach(ensureMinSizes);
        selected = 0;
        buildRegionSelect();
        syncSelectedToFields();
        setDirty(true);
        renderToolbar();
        redraw();
      } catch (_) {}
    };
    reader.readAsText(file);
  }

  // ---------- UI actions ----------
  btnRefresh.addEventListener('click', () => { if (!loadingImage) loadImageFromServer(); });
  btnPrev.addEventListener('click', () => selectIndex(selected - 1));
  btnNext.addEventListener('click', () => selectIndex(selected + 1));

  btnAdd.addEventListener('click', () => {
    if (!imageReady || !imgW || !imgH) return;
    const name = uniqueRegionName();
    const w = Math.max(64, Math.round(imgW * 0.20));
    const h = Math.max(32, Math.round(imgH * 0.20));
    regions.push({
      name,
      description: "",
      geometry: { cx: imgW/2, cy: imgH/2, width: w, height: h, rotation_deg: 0 }
    });
    selected = regions.length - 1;
    buildRegionSelect();
    syncSelectedToFields();
    setDirty(true);
    renderToolbar();
    redraw();
  });

  btnDel.addEventListener('click', () => {
    if (!regions.length) return;
    const del = selected;
    regions.splice(del, 1);
    selected = regions.length ? Math.min(del, regions.length - 1) : 0;
    buildRegionSelect();
    syncSelectedToFields();
    setDirty(true);
    renderToolbar();
    redraw();
  });

  btnSave.addEventListener('click', () => { if (!savingRegions) saveRegionsToServer(); });
  btnRevert.addEventListener('click', () => { if (!loadingRegions) loadRegionsFromServer(); });

  regionSelect.addEventListener('change', () => {
    const i = Number(regionSelect.value);
    if (!Number.isFinite(i)) return;
    selectIndex(i);
  });

  function validateName(s) { return /^[A-Za-z_][A-Za-z0-9_]*$/.test(s); }

  regionName.addEventListener('input', () => {
    if (!regions.length) return;
    const s = regionName.value;
    if (!validateName(s)) return;
    regions[selected].name = s;
    buildRegionSelect();
    setDirty(true);
    redraw();
  });

  regionDesc.addEventListener('input', () => {
    if (!regions.length) return;
    regions[selected].description = regionDesc.value;
    setDirty(true);
  });

  btnFileSave.addEventListener('click', () => {
    if (btnFileSave.classList.contains('disabled')) return;
    doFileSave();
  });
  btnFileLoad.addEventListener('click', () => {
    if (btnFileLoad.classList.contains('disabled')) return;
    fileInput.value = '';
    fileInput.click();
  });
  fileInput.addEventListener('change', () => doFileLoad(fileInput.files?.[0]));

  window.addEventListener('keydown', (e) => {
    if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.isContentEditable)) return;
    if (e.key === 'ArrowLeft') { e.preventDefault(); selectIndex(selected - 1); }
    if (e.key === 'ArrowRight'){ e.preventDefault(); selectIndex(selected + 1); }
  });

  // ---------- Pointer interaction ----------
  function withinImageArea(pCanvas) {
    return dispRect &&
      pCanvas.x >= dispRect.x && pCanvas.x <= dispRect.x + dispRect.w &&
      pCanvas.y >= dispRect.y && pCanvas.y <= dispRect.y + dispRect.h;
  }

  overlay.addEventListener('pointerdown', (e) => {
    if (!imageReady || !dispRect || !regions.length) return;

    const rect = card.getBoundingClientRect();
    const pCanvas = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    if (!withinImageArea(pCanvas)) return;

    const pImg = canvasToImage(pCanvas);

    const pick = pickRegionAtImage(pImg.x, pImg.y);
    if (pick === null) return;

    if (pick !== selected) selectIndex(pick);

    const g = regions[selected].geometry;
    const h = handleHitTest(pCanvas, g);

    let mode = 'move';
    let handle = null;
    if (h) { mode = h.type; handle = h; }
    else if (!pointInRegionImage(pImg.x, pImg.y, g)) return;

    drag = {
      mode: (mode === 'resize' ? 'resize' : mode),
      handle,
      pointerId: e.pointerId,
      startCanvas: pCanvas,
      startImg: pImg,
      g0: JSON.parse(JSON.stringify(g)),
      anchorLocal: null,
    };

    if (drag.mode === 'resize') {
      const opp = handle.opp;
      drag.anchorLocal = localOfHandle(opp, drag.g0);
    }

    overlay.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  overlay.addEventListener('pointermove', (e) => {
    if (!dispRect) return;

    const rect = card.getBoundingClientRect();
    const pCanvas = { x: e.clientX - rect.left, y: e.clientY - rect.top };

    // Cursor feedback (when not dragging)
    if (!drag && regions.length && withinImageArea(pCanvas)) {
      const g = regions[selected].geometry;
      const h = handleHitTest(pCanvas, g);
      if (h) {
        overlay.style.cursor = h.cursor || 'pointer';
      } else {
        const pImg = canvasToImage(pCanvas);
        overlay.style.cursor = pointInRegionImage(pImg.x, pImg.y, g) ? 'move' : 'default';
      }
    } else if (!drag) {
      overlay.style.cursor = 'default';
    }

    if (!drag || e.pointerId !== drag.pointerId || !regions.length) return;

    const g = regions[selected].geometry;
    const g0 = drag.g0;

    if (drag.mode === 'move') {
      const pImg = canvasToImage(pCanvas);
      const dx = pImg.x - drag.startImg.x;
      const dy = pImg.y - drag.startImg.y;
      g.cx = g0.cx + dx;
      g.cy = g0.cy + dy;
      setDirty(true);
      redraw();
      return;
    }

    if (drag.mode === 'rotate') {
      const pImg = canvasToImage(pCanvas);
      const dx = pImg.x - g0.cx;
      const dy = pImg.y - g0.cy;
      g.rotation_deg = deg(Math.atan2(-dy, dx));
      setDirty(true);
      redraw();
      return;
    }

    if (drag.mode === 'resize') {
      const h = drag.handle;
      const anchor = drag.anchorLocal;

      const cur = canvasToLocalImage(pCanvas, g0); // {x,y,pImg} local in image px (using g0 rotation)
      const pL = {x: cur.x, y: cur.y};

      // Start with old values
      let newW = g0.width;
      let newH = g0.height;

      // Determine which axes are active based on handle id
      const id = h.id;
      const affectsX = (id === 'tl' || id === 'tr' || id === 'br' || id === 'bl' || id === 'rm' || id === 'lm');
      const affectsY = (id === 'tl' || id === 'tr' || id === 'br' || id === 'bl' || id === 'tm' || id === 'bm');

      // For edge handles, ignore the non-affected coordinate by setting it to old value position.
      if (!affectsX) pL.x = localOfHandle(id, g0).x; // keep x constant
      if (!affectsY) pL.y = localOfHandle(id, g0).y; // keep y constant

      newW = Math.abs(pL.x - anchor.x);
      newH = Math.abs(pL.y - anchor.y);

      newW = Math.max(64, newW);
      newH = Math.max(32, newH);

      // New center in local coords is midpoint between anchor and pointer
      const centerLocal = { x: (anchor.x + pL.x)/2, y: (anchor.y + pL.y)/2 };
      const dImg = localToImageDelta(centerLocal, g0);

      g.cx = g0.cx + dImg.x;
      g.cy = g0.cy + dImg.y;
      g.width = newW;
      g.height = newH;
      g.rotation_deg = g0.rotation_deg;

      setDirty(true);
      redraw();
      return;
    }
  });

  function endDrag(e) {
    if (!drag || e.pointerId !== drag.pointerId) return;
    drag = null;
    overlay.style.cursor = 'default';
    try { overlay.releasePointerCapture(e.pointerId); } catch {}
  }
  overlay.addEventListener('pointerup', endDrag);
  overlay.addEventListener('pointercancel', endDrag);

  // Click to select another region (without dragging)
  overlay.addEventListener('click', (e) => {
    if (drag || !imageReady || !dispRect || !regions.length) return;
    const rect = card.getBoundingClientRect();
    const pCanvas = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    if (!withinImageArea(pCanvas)) return;
    const pImg = canvasToImage(pCanvas);
    const pick = pickRegionAtImage(pImg.x, pImg.y);
    if (pick !== null) selectIndex(pick);
  });

  // ---------- Resize / repaint ----------
  window.addEventListener('resize', () => redraw());
  photo.addEventListener('load', () => redraw());

  // ---------- Initial load ----------
  function init() {
    lastRefresh.textContent = '';
    renderToolbar();

    btnFileSave.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); btnFileSave.click(); }});
    btnFileLoad.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); btnFileLoad.click(); }});

    loadRegionsFromServer();
    loadImageFromServer();
  }
  init();
})();
</script>
</body>
</html>
