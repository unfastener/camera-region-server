<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Camera Region Editor</title>
  <style>
    :root{
      --gap: 16px;
      --ctrl-h: 42px;
      --toolbar-row-gap: 8px;
      --toolbar-col-gap: 10px;
      --button-cell-w: 132px;
      --field-cell-w: 220px;
      --fg: #fff;
      --bg: #292929;
      --button-fg: #ddd;
      --button-bg: rgb(30,30,30);
      --button-bg-disabled: rgb(22,22,22);
      --button-fg-disabled: #666;
      --drop-shadow: 0 8px 20px rgba(0,0,0,0.35);
      --stream-bg: #000;

      --wire: rgba(200,200,200,0.95);
      --wire-selected: rgba(255,220,70,0.98);
      --wire-outline: rgba(0,0,0,0.85);
      --wire-width: 2.25;
      --wire-outline-width: 4.75;
      --label-font: 13px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      --label-pad: 6;
      --label-radius: 6;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .page{
      min-height: 100%;
      display:flex;
      flex-direction:column;
      box-sizing:border-box;
      padding:var(--gap);
      gap:var(--gap);
    }

    .toolbar{
      display:block;
    }

    .controls{
      display:grid;
      grid-template-columns:
        var(--button-cell-w)
        minmax(var(--field-cell-w), 1fr)
        minmax(var(--field-cell-w), 1.2fr)
        var(--button-cell-w)
        var(--button-cell-w)
        var(--button-cell-w);
      grid-template-rows: var(--ctrl-h) var(--ctrl-h);
      gap: var(--toolbar-row-gap) var(--toolbar-col-gap);
      min-width: 0;
      align-items: stretch;
    }

    .cell-refresh{ grid-column: 1; grid-row: 1; }
    .cell-timestamp{ grid-column: 1; grid-row: 2; }
    .cell-region-select{ grid-column: 2; grid-row: 1; }
    .cell-region-name{ grid-column: 3; grid-row: 1; }
    .cell-region-desc{ grid-column: 2 / 4; grid-row: 2; }
    .cell-nav{ grid-column: 4; grid-row: 1; }
    .cell-edit{ grid-column: 4; grid-row: 2; }
    .cell-save{ grid-column: 5; grid-row: 1; }
    .cell-revert{ grid-column: 5; grid-row: 2; }
    .cell-file-save{ grid-column: 6; grid-row: 1; }
    .cell-file-load{ grid-column: 6; grid-row: 2; }

    button, input, select, label.filebtn{
      border: 1px solid rgba(255,255,255,0.10);
      background: var(--button-bg);
      color: var(--button-fg);
      border-radius: 12px;
      box-shadow: var(--drop-shadow);
      padding: 10px 12px;
      font: 600 14px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      letter-spacing: 0.2px;
      outline: none;
      transition: transform 80ms ease, opacity 80ms ease, border-color 120ms ease;
      min-height: var(--ctrl-h);
      height: var(--ctrl-h);
      box-sizing: border-box;
      width: 100%;
    }

    button:hover:not(:disabled), label.filebtn:hover{
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.22);
      cursor:pointer;
    }

    button:focus-visible, input:focus-visible, select:focus-visible, label.filebtn:focus-visible{
      border-color: rgba(255,255,255,0.35);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.14), var(--drop-shadow);
    }

    button:active:not(:disabled), label.filebtn:active{
      transform: translateY(0px);
      opacity: 0.9;
    }

    button:disabled, input:disabled, select:disabled, label.filebtn.disabled{
      background: var(--button-bg-disabled);
      color: var(--button-fg-disabled);
      box-shadow: none;
      border-color: rgba(255,255,255,0.06);
      cursor:not-allowed;
      transform:none;
      opacity: 0.9;
    }

    input, select{
      font-weight: 500;
      padding: 10px 10px;
      min-width: 0;
    }

    .small{
      font: 12px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      opacity: 0.85;
      user-select:none;
      white-space: nowrap;
      min-height: var(--ctrl-h);
      line-height: var(--ctrl-h);
      text-align: center;
      padding: 0;
    }

    #regionSelect{ min-width: 0; }
    #regionName{ min-width: 0; }
    #regionDesc{ min-width: 0; width: 100%; }

    .pill{
      display: inline-flex;
      height: var(--ctrl-h);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      overflow: hidden;
      background: var(--button-bg);
      box-shadow: var(--drop-shadow);
      width: 100%;
    }

    .pill__btn{
      flex: 1 1 50%;
      min-height: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      font: 700 18px/1 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      cursor: pointer;
    }

    .pill__btn + .pill__btn{
      border-left: 1px solid rgba(255,255,255,0.10);
    }

    .pill__btn:hover:not(:disabled){ background: rgba(255,255,255,0.07); }
    .pill__btn:active:not(:disabled){ background: rgba(255,255,255,0.12); }
    .pill__btn:focus-visible{
      outline: 2px solid rgba(255,255,255,0.45);
      outline-offset: -2px;
    }

    .pill__btn:disabled{
      color: var(--button-fg-disabled);
      background: transparent;
      cursor: not-allowed;
      opacity: 0.9;
    }

    .pill.disabled{
      background: var(--button-bg-disabled);
      box-shadow: none;
      border-color: rgba(255,255,255,0.06);
    }

    .pill__btn--danger{
      color: #a64a4a;
    }

    button, label.filebtn{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    #btnSave.dirty::before{
      content: "•";
      color: #a64a4a;
      font-size: 1.5em;
      line-height: 1;
      margin-right: 0.55em;
    }

    .wrap{
      flex:1;
      display:flex;
      align-items: stretch;
      justify-content:center;
      min-height: 0;
    }

    .card{
      position:relative;
      width: 100%;
      max-width: 1800px;
      border-radius: 12px;
      overflow:hidden;
      box-shadow: var(--drop-shadow);
      background: var(--stream-bg);
      user-select:none;
      min-height: 0;
    }

    .stage{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background: #111;
    }

    img#photo{
      position:absolute;
      left:0;
      top:0;
      width:0;
      height:0;
      user-select:none;
      -webkit-user-drag: none;
      pointer-events:none;
    }

    canvas#overlay{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:auto;
      touch-action:none;
    }

    .spinner{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(1px);
    }
    .spinner.show{ display:flex; }
    .spin{
      width: 60px;
      height: 60px;
      animation: rot 1.0s linear infinite;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.5));
      opacity: 0.95;
    }
    @keyframes rot { from { transform: rotate(0deg); } to { transform: rotate(360deg);} }

    .hint{
      position:absolute;
      left: 12px;
      bottom: 10px;
      font: 12px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      opacity: 0.65;
      user-select:none;
      pointer-events:none;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    .zoompill{
      position: absolute;
      top: 12px;
      right: 12px;
      width: var(--button-cell-w);
      height: var(--ctrl-h);
      z-index: 4;
    }

    .zoompill .pill__btn{
      font-size: 14px;
      letter-spacing: -0.4px;
      padding: 0;
    }

    input[type="file"]{ display:none; }
  </style>
</head>
<body>
  <div class="page">
    <div class="toolbar">
      <div class="controls">
        <button id="btnRefresh" class="cell-refresh">Refresh</button>
        <select id="regionSelect" class="cell-region-select" disabled></select>
        <input id="regionName" class="cell-region-name" type="text" placeholder="region_name" pattern="[A-Za-z_][A-Za-z0-9_]*" disabled />
        <input id="regionDesc" class="cell-region-desc" type="text" placeholder="Description" maxlength="256" disabled />
        <button id="btnSave" class="cell-save" disabled>Save</button>
        <button id="btnRevert" class="cell-revert" disabled>Revert</button>

        <label class="filebtn disabled cell-file-save" id="btnFileSave" title="Save regions to a file">
          File Save
        </label>
        <label class="filebtn disabled cell-file-load" id="btnFileLoad" title="Open regions from a file">
          File Open
        </label>
        <input id="fileInput" type="file" accept="application/json,.json" />

        <div class="small cell-timestamp" id="lastRefresh">&nbsp;</div>

        <div class="pill cell-nav" id="pillNav" role="group" aria-label="Region select navigation">
          <button id="btnPrev" class="pill__btn" type="button" aria-label="Previous region" tabindex="-1" disabled>▴</button>
          <button id="btnNext" class="pill__btn" type="button" aria-label="Next region" tabindex="-1" disabled>▾</button>
        </div>
        <div class="pill cell-edit" id="pillEdit" role="group" aria-label="Region edit actions">
          <button id="btnAdd" class="pill__btn" type="button" aria-label="Add region" tabindex="-1" disabled>+</button>
          <button id="btnDel" class="pill__btn pill__btn--danger" type="button" aria-label="Delete region" tabindex="-1" disabled>🗑</button>
        </div>
      </div>
    </div>

    <div class="wrap">
      <div class="card" id="card">
        <div class="stage" id="stage">
          <img id="photo" alt="Camera capture" />
          <canvas id="overlay"></canvas>

          <div class="pill zoompill" id="pillZoom" role="group" aria-label="Zoom controls">
            <button id="btnZoomIn" class="pill__btn" type="button" aria-label="Zoom in" tabindex="-1">🔍+</button>
            <button id="btnZoomAll" class="pill__btn" type="button" aria-label="Show all" tabindex="-1">🔍</button>
            <button id="btnZoomOut" class="pill__btn" type="button" aria-label="Zoom out" tabindex="-1">🔍−</button>
          </div>

          <div class="spinner" id="spinner" aria-label="Loading">
            <!-- Easily replaceable spinner asset -->
            <svg class="spin" viewBox="0 0 50 50" aria-hidden="true">
              <circle cx="25" cy="25" r="20" fill="none" stroke="white" stroke-opacity="0.25" stroke-width="5"></circle>
              <path d="M45 25a20 20 0 0 1-20 20" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"></path>
            </svg>
          </div>

          <div class="hint">Drag inside region to move. Drag handles to resize/rotate.</div>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  // ---------- DOM ----------
  const btnRefresh = document.getElementById('btnRefresh');
  const btnPrev    = document.getElementById('btnPrev');
  const btnNext    = document.getElementById('btnNext');
  const btnAdd     = document.getElementById('btnAdd');
  const btnDel     = document.getElementById('btnDel');
  const btnSave    = document.getElementById('btnSave');
  const btnRevert  = document.getElementById('btnRevert');
  const btnFileSave= document.getElementById('btnFileSave');
  const btnFileLoad= document.getElementById('btnFileLoad');
  const btnZoomIn  = document.getElementById('btnZoomIn');
  const btnZoomAll = document.getElementById('btnZoomAll');
  const btnZoomOut = document.getElementById('btnZoomOut');
  const pillNav    = document.getElementById('pillNav');
  const pillEdit   = document.getElementById('pillEdit');

  const lastRefresh = document.getElementById('lastRefresh');

  const regionSelect= document.getElementById('regionSelect');
  const regionName  = document.getElementById('regionName');
  const regionDesc  = document.getElementById('regionDesc');

  const fileInput   = document.getElementById('fileInput');

  const photo       = document.getElementById('photo');
  const overlay     = document.getElementById('overlay');
  const spinner     = document.getElementById('spinner');
  const card        = document.getElementById('card');

  // ---------- State ----------
  let imageReady = false;
  let imgW = 0, imgH = 0;  // natural image pixels
  let dispRect = null;     // displayed image rect within card, in CSS pixels (letterboxed)
  let viewZoom = 1;
  let panX = 0;
  let panY = 0;
  let panDrag = null;      // {startX,startY,panX0,panY0,pointerId,moved}
  let suppressNextClick = false;

  let regions = [];
  let selected = -1;
  let dirty = false;

  let loadingImage = false;
  let loadingRegions = false;
  let savingRegions = false;

  // drag: {mode:'move'|'resize'|'rotate', handle, startCanvas, centerCanvas0, g0, rot0, ang0, pointerId}
  let drag = null;

  // ---------- Helpers ----------
  const rad = (deg) => deg * Math.PI / 180;
  const deg = (r) => r * 180 / Math.PI;

  function nowLocalString(d) {
    const pad2 = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
  }

  function unixSecondsToLocalString(sec) {
    if (!Number.isFinite(sec)) return '';
    return nowLocalString(new Date(sec * 1000));
  }

  function setSpinner(on) { spinner.classList.toggle('show', !!on); }

  function setDirty(v) { dirty = !!v; renderToolbar(); }

  function setFileBtnEnabled(labelEl, enabled) {
    labelEl.classList.toggle('disabled', !enabled);
    labelEl.tabIndex = enabled ? 0 : -1;
    labelEl.setAttribute('aria-disabled', enabled ? 'false' : 'true');
  }

  function hasRealSelection() {
    return selected >= 0 && selected < regions.length;
  }

  function getSelectionCount() {
    return regions.length + 1; // +1 for "--" pseudo region
  }

  function selectionToOrdinal(sel) {
    return sel < 0 ? 0 : sel + 1;
  }

  function ordinalToSelection(ord) {
    return ord <= 0 ? -1 : ord - 1;
  }

  function stepSelection(delta) {
    const count = getSelectionCount();
    if (count <= 0) return;
    const ord = selectionToOrdinal(selected);
    const nextOrd = ((ord + delta) % count + count) % count;
    selectIndex(ordinalToSelection(nextOrd));
  }

  function renderToolbar() {
    btnSave.textContent = "Save";
    btnSave.classList.toggle('dirty', dirty);

    btnRefresh.disabled = loadingImage;

    const haveRegions = regions.length > 0;
    const hasSel = hasRealSelection();
    const regionsBusy = loadingRegions || savingRegions;

    regionSelect.disabled = regionsBusy;
    regionName.disabled   = regionsBusy || !hasSel;
    regionDesc.disabled   = regionsBusy || !hasSel;

    btnPrev.disabled   = regionsBusy || getSelectionCount() <= 1;
    btnNext.disabled   = regionsBusy || getSelectionCount() <= 1;
    btnDel.disabled    = regionsBusy || !hasSel;
    btnSave.disabled   = regionsBusy || !haveRegions;
    btnRevert.disabled = loadingRegions;
    btnAdd.disabled    = regionsBusy || !imageReady;
    btnZoomIn.disabled = !imageReady;
    btnZoomAll.disabled = !imageReady;
    btnZoomOut.disabled = !imageReady;

    pillNav.classList.toggle('disabled', btnPrev.disabled && btnNext.disabled);
    pillEdit.classList.toggle('disabled', btnAdd.disabled && btnDel.disabled);

    setFileBtnEnabled(btnFileSave, !regionsBusy && haveRegions);
    setFileBtnEnabled(btnFileLoad, !loadingRegions);
  }

  function updateDispRect() {
    const stageRect = card.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;

    if (!imageReady || !imgW || !imgH) {
      dispRect = { x: 0, y: 0, w: 0, h: 0, stageW: stageRect.width, stageH: stageRect.height };
    } else {
      const fit = Math.min(stageRect.width / imgW, stageRect.height / imgH);
      const baseW = imgW * fit;
      const baseH = imgH * fit;
      const baseX = (stageRect.width - baseW) / 2;
      const baseY = (stageRect.height - baseH) / 2;
      const w = baseW * viewZoom;
      const h = baseH * viewZoom;
      const x = baseX + panX;
      const y = baseY + panY;

      dispRect = {
        x, y, w, h,
        stageW: stageRect.width,
        stageH: stageRect.height,
      };

      photo.style.left = `${x}px`;
      photo.style.top = `${y}px`;
      photo.style.width = `${w}px`;
      photo.style.height = `${h}px`;
    }

    overlay.width  = Math.max(1, Math.round(stageRect.width * dpr));
    overlay.height = Math.max(1, Math.round(stageRect.height * dpr));
    overlay.style.width = `${stageRect.width}px`;
    overlay.style.height = `${stageRect.height}px`;

    const ctx = overlay.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function imageToCanvas(p) {
    const sx = dispRect.w / imgW;
    const sy = dispRect.h / imgH;
    return { x: dispRect.x + p.x * sx, y: dispRect.y + p.y * sy };
  }

  function zoomAt(factor, anchorX, anchorY) {
    if (!imageReady || !imgW || !imgH || !dispRect) return;
    const stageRect = card.getBoundingClientRect();
    const fit = Math.min(stageRect.width / imgW, stageRect.height / imgH);
    const baseW = imgW * fit;
    const baseH = imgH * fit;
    const baseX = (stageRect.width - baseW) / 2;
    const baseY = (stageRect.height - baseH) / 2;
    const oldZoom = viewZoom;
    const newZoom = Math.min(12, Math.max(1, oldZoom * factor));
    if (newZoom === oldZoom) return;

    const rx = (anchorX - baseX - panX) / (baseW * oldZoom);
    const ry = (anchorY - baseY - panY) / (baseH * oldZoom);

    viewZoom = newZoom;
    panX = anchorX - baseX - rx * (baseW * newZoom);
    panY = anchorY - baseY - ry * (baseH * newZoom);
    redraw();
  }

  function resetZoomToShowAll() {
    viewZoom = 1;
    panX = 0;
    panY = 0;
    redraw();
  }

  function ensureMinSizes(r) {
    const w0 = r.geometry.width;
    const h0 = r.geometry.height;
    r.geometry.width = Math.max(64, Math.round(r.geometry.width));
    r.geometry.height = Math.max(32, Math.round(r.geometry.height));
    return r.geometry.width !== w0 || r.geometry.height !== h0;
  }

  function uniqueRegionName() {
    let n = 0;
    while (true) {
      const name = `region_${n}`;
      if (!regions.some(r => r.name === name)) return name;
      n++;
    }
  }

  function buildRegionSelect() {
    regionSelect.innerHTML = '';
    const none = document.createElement('option');
    none.value = '-1';
    none.textContent = '--';
    regionSelect.appendChild(none);
    regions.forEach((r, idx) => {
      const opt = document.createElement('option');
      opt.value = String(idx);
      opt.textContent = `${idx}: ${r.name}`;
      regionSelect.appendChild(opt);
    });
    regionSelect.value = String(hasRealSelection() ? selected : -1);
  }

  function syncSelectedToFields() {
    regionSelect.value = String(hasRealSelection() ? selected : -1);
    if (!hasRealSelection()) {
      regionName.value = '';
      regionDesc.value = '';
      return;
    }
    regionName.value = regions[selected].name ?? '';
    regionDesc.value = regions[selected].description ?? '';
  }

  function selectIndex(i) {
    if (i < 0 || regions.length === 0) selected = -1;
    else selected = ((i % regions.length) + regions.length) % regions.length;
    syncSelectedToFields();
    renderToolbar();
    redraw();
  }

  function getCssVar(name, fallback) {
    const v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    return v || fallback;
  }

  function validateName(s) { return /^[A-Za-z_][A-Za-z0-9_]*$/.test(s); }

  function normalizeDescription(v) {
    const s = String(v ?? '');
    return s.length > 256 ? s.slice(0, 256) : s;
  }

  function parseRegionsPayloadStrict(obj) {
    if (!obj || typeof obj !== 'object' || !Array.isArray(obj.regions)) return null;
    for (const r of obj.regions) {
      if (!r || typeof r !== 'object') return null;
      if (typeof r.name !== 'string') return null;
      if (r.description !== undefined && typeof r.description !== 'string') return null;
      if (!r.geometry || typeof r.geometry !== 'object') return null;
      const g = r.geometry;
      if (![g.cx, g.cy, g.width, g.height, g.rotation_deg].every(Number.isFinite)) return null;
    }
    return obj.regions;
  }

  function normalizeRegions(rawRegions) {
    const usedNames = new Set();
    let changed = false;

    const normalized = rawRegions.map((r) => {
      let name = String(r.name ?? '').trim();
      const originalName = name;
      if (!validateName(name) || usedNames.has(name)) {
        changed = true;
        let n = 0;
        while (true) {
          const candidate = `region_${n}`;
          if (!usedNames.has(candidate)) {
            name = candidate;
            break;
          }
          n += 1;
        }
      }
      usedNames.add(name);

      const sourceDesc = String(r.description ?? '');
      const description = normalizeDescription(sourceDesc);
      if (description !== sourceDesc) changed = true;

      const region = {
        name,
        description,
        geometry: {
          cx: Number(r.geometry?.cx ?? 0),
          cy: Number(r.geometry?.cy ?? 0),
          width: Number(r.geometry?.width ?? 64),
          height: Number(r.geometry?.height ?? 32),
          rotation_deg: Number(r.geometry?.rotation_deg ?? 0),
        }
      };

      if (name !== originalName) changed = true;
      if (ensureMinSizes(region)) changed = true;
      return region;
    });

    return { normalized, changed };
  }

  // ---------- Drawing ----------
  function redraw() {
    updateDispRect();
    const ctx = overlay.getContext('2d');
    const stageRect = card.getBoundingClientRect();
    ctx.clearRect(0, 0, stageRect.width, stageRect.height);

    if (!imageReady || !regions.length || !imgW || !imgH) return;

    // Draw non-selected back-to-front; selected last.
    const indices = regions.map((_, i) => i).sort((a,b) => b-a);
    const ordered = hasRealSelection() ? indices.filter(i => i !== selected).concat(selected) : indices;

    for (const i of ordered) drawRegion(ctx, regions[i], i, i === selected);
  }

  function drawRegion(ctx, r, idx, isSelected) {
    const g = r.geometry;
    const color = isSelected ? getCssVar('--wire-selected', 'rgba(255,220,70,0.98)')
                             : getCssVar('--wire', 'rgba(200,200,200,0.95)');
    const outline = getCssVar('--wire-outline', 'rgba(0,0,0,0.85)');
    const wCol = parseFloat(getCssVar('--wire-width', '2.25')) || 2.25;
    const wOut = parseFloat(getCssVar('--wire-outline-width', '4.75')) || 4.75;

    const theta = -rad(g.rotation_deg || 0);

    const c = imageToCanvas({x: g.cx, y: g.cy});
    const sx = dispRect.w / imgW;
    const sy = dispRect.h / imgH;
    const wDisp = g.width * sx;
    const hDisp = g.height * sy;

    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(theta);

    // Index label (square corners) UNDER the wireframe
    const label = String(idx);
    const boxH = Math.max(8, Math.min(24, Math.max(1, hDisp)));
    const padX = Math.max(2, Math.round(boxH * 0.25));
    const fontPx = Math.max(9, Math.round(boxH * 0.70));
    ctx.font = `${fontPx}px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif`;
    ctx.textBaseline = 'middle';

    const textW = ctx.measureText(label).width;
    const boxW = Math.min(textW + 2*padX, Math.max(1, wDisp));

    const x0 = -wDisp/2;
    const y0 = -hDisp/2;

    ctx.beginPath();
    ctx.rect(x0, y0, boxW, boxH);
    ctx.fillStyle = color; ctx.fill();
    ctx.lineWidth = (wOut - wCol) / 2; ctx.strokeStyle = outline; ctx.stroke();

    ctx.save();
    ctx.beginPath();
    ctx.rect(x0, y0, boxW, boxH);
    ctx.clip();
    ctx.fillStyle = '#000';
    ctx.fillText(label, x0 + padX, y0 + boxH/2);
    ctx.restore();

    // Wireframe on top
    ctx.beginPath();
    ctx.rect(-wDisp/2, -hDisp/2, wDisp, hDisp);
    ctx.strokeStyle = outline; ctx.lineWidth = wOut; ctx.lineJoin = 'round'; ctx.stroke();
    ctx.strokeStyle = color;   ctx.lineWidth = wCol; ctx.stroke();

    if (isSelected) drawHandles(ctx, wDisp, hDisp, color, outline);

    ctx.restore();
  }

  function drawHandles(ctx, wDisp, hDisp, color, outline) {
    const size = 14;
    const half = size/2;
    const rotR = 7;
    const rotOffset = 22;

    const pts = [
      {k:'nw', x:-wDisp/2, y:-hDisp/2},
      {k:'n',  x:0,        y:-hDisp/2},
      {k:'ne', x:wDisp/2,  y:-hDisp/2},
      {k:'e',  x:wDisp/2,  y:0},
      {k:'se', x:wDisp/2,  y:hDisp/2},
      {k:'s',  x:0,        y:hDisp/2},
      {k:'sw', x:-wDisp/2, y:hDisp/2},
      {k:'w',  x:-wDisp/2, y:0},
    ];

    // Stem first so the top midpoint resize handle is drawn on top of it.
    ctx.beginPath();
    ctx.moveTo(0, -hDisp/2);
    ctx.lineTo(0, -hDisp/2 - rotOffset + rotR);
    ctx.strokeStyle = outline; ctx.lineWidth = 2; ctx.stroke();

    // Resize squares on top of stem
    for (const p of pts) {
      ctx.beginPath();
      ctx.rect(p.x - half, p.y - half, size, size);
      ctx.fillStyle = color; ctx.fill();
      ctx.lineWidth = 2; ctx.strokeStyle = outline; ctx.stroke();
    }

    // Rotation circle on top
    ctx.beginPath();
    ctx.arc(0, -hDisp/2 - rotOffset, rotR, 0, Math.PI*2);
    ctx.fillStyle = color; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = outline; ctx.stroke();
  }

  // ---------- Hit testing (DISPLAY pixels) ----------
  function localFromCanvas(pCanvas, g) {
    const c = imageToCanvas({x:g.cx, y:g.cy});
    // NOTE: drawing uses theta_draw = -rot. World->local must use +rot.
    const theta = rad(g.rotation_deg || 0);
    const dx = pCanvas.x - c.x;
    const dy = pCanvas.y - c.y;
    const lx = dx*Math.cos(theta) - dy*Math.sin(theta);
    const ly = dx*Math.sin(theta) + dy*Math.cos(theta);

    const sx = dispRect.w / imgW;
    const sy = dispRect.h / imgH;
    const wDisp = g.width * sx;
    const hDisp = g.height * sy;

    return { lx, ly, wDisp, hDisp, c, theta, sx, sy };
  }

  function hitTest(pCanvas, g) {
    // Returns {mode, handle?} or null. Handles are active even if outside box.
    const {lx, ly, wDisp, hDisp} = localFromCanvas(pCanvas, g);
    const size = 14;
    const half = size/2;
    const rotR = 7;
    const rotOffset = 22;

    // Rotation
    const rx = 0, ry = -hDisp/2 - rotOffset;
    if ((lx-rx)*(lx-rx) + (ly-ry)*(ly-ry) <= rotR*rotR) return {mode:'rotate'};

    // Resize (8 squares)
    const handles = [
      {k:'nw', x:-wDisp/2, y:-hDisp/2},
      {k:'n',  x:0,        y:-hDisp/2},
      {k:'ne', x:wDisp/2,  y:-hDisp/2},
      {k:'e',  x:wDisp/2,  y:0},
      {k:'se', x:wDisp/2,  y:hDisp/2},
      {k:'s',  x:0,        y:hDisp/2},
      {k:'sw', x:-wDisp/2, y:hDisp/2},
      {k:'w',  x:-wDisp/2, y:0},
    ];

    // Prefer corners/edges before move (so you can grab outside-box parts of the handle)
    for (const h of handles) {
      if (Math.abs(lx - h.x) <= half && Math.abs(ly - h.y) <= half) return {mode:'resize', handle:h.k};
    }

    // Move: inside rectangle (epsilon)
    const eps = 0.5;
    if (Math.abs(lx) <= wDisp/2 + eps && Math.abs(ly) <= hDisp/2 + eps) return {mode:'move'};
    return null;
  }

  function pickInteractionTarget(pCanvas) {
    if (!regions.length) return null;

    // 1) Selected region has priority if any hit
    const selG = regions[selected]?.geometry;
    if (selG) {
      const ht = hitTest(pCanvas, selG);
      if (ht) return { index: selected, hit: ht };
    }

    // 2) Otherwise choose closest center among any hits, preferring handle hits over move hits
    const handleHits = [];
    const moveHits = [];

    for (let i=0;i<regions.length;i++) {
      const g = regions[i].geometry;
      const ht = hitTest(pCanvas, g);
      if (!ht) continue;
      const c = imageToCanvas({x:g.cx, y:g.cy});
      const d = (c.x - pCanvas.x)*(c.x - pCanvas.x) + (c.y - pCanvas.y)*(c.y - pCanvas.y);
      if (ht.mode === 'resize' || ht.mode === 'rotate') handleHits.push({i, ht, d});
      else moveHits.push({i, ht, d});
    }

    if (handleHits.length) {
      handleHits.sort((a,b)=>a.d-b.d);
      return { index: handleHits[0].i, hit: handleHits[0].ht };
    }
    if (moveHits.length) {
      moveHits.sort((a,b)=>a.d-b.d);
      return { index: moveHits[0].i, hit: moveHits[0].ht };
    }
    return null;
  }

  function pickRegionForSelect(pCanvas) {
    // For click-to-select: allow inside-box selection anywhere (even outside image).
    if (!regions.length) return null;
    const inside = [];
    for (let i=0;i<regions.length;i++) {
      const g = regions[i].geometry;
      const {lx, ly, wDisp, hDisp} = localFromCanvas(pCanvas, g);
      if (Math.abs(lx) <= wDisp/2 && Math.abs(ly) <= hDisp/2) inside.push(i);
    }
    if (!inside.length) return null;
    if (inside.includes(selected)) return selected;
    let best = inside[0], bestD = Infinity;
    for (const i of inside) {
      const g = regions[i].geometry;
      const c = imageToCanvas({x:g.cx, y:g.cy});
      const d = (c.x - pCanvas.x)*(c.x - pCanvas.x) + (c.y - pCanvas.y)*(c.y - pCanvas.y);
      if (d < bestD) { bestD = d; best = i; }
    }
    return best;
  }

  // ---------- API ----------
  async function loadRegionsFromServer() {
    loadingRegions = true; renderToolbar();
    try {
      const res = await fetch('api/v1/regions', { cache: 'no-store' });
      if (!res.ok) throw new Error();
      const data = await res.json();
      const rr = parseRegionsPayloadStrict(data);
      if (!rr) throw new Error();
      const normalized = normalizeRegions(rr);
      regions = normalized.normalized;
      selected = -1;
      buildRegionSelect();
      syncSelectedToFields();
      setDirty(normalized.changed);
    } catch (_) {
    } finally {
      loadingRegions = false; renderToolbar(); redraw();
    }
  }

  async function saveRegionsToServer() {
    if (!regions.length) return;
    savingRegions = true; renderToolbar();
    try {
      const body = JSON.stringify({ regions: regions.map(r => ({
        name: r.name,
        description: r.description,
        geometry: {
          cx: r.geometry.cx,
          cy: r.geometry.cy,
          width: Math.round(r.geometry.width),
          height: Math.round(r.geometry.height),
          rotation_deg: r.geometry.rotation_deg,
        }
      }))});
      const res = await fetch('api/v1/regions', {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body
      });
      if (!res.ok) throw new Error();
      setDirty(false);
    } catch (_) {
    } finally {
      savingRegions = false; renderToolbar(); redraw();
    }
  }

  async function loadImageFromServer() {
    loadingImage = true; renderToolbar(); setSpinner(true);
    try {
      const res = await fetch('api/v1/images/full?new_capture=true&wait=true', { cache: 'no-store' });
      if (!res.ok) throw new Error();
      const tsHeader = res.headers.get('X-Capture-Timestamp');
      const ts = tsHeader === null ? NaN : Number(tsHeader);
      lastRefresh.textContent = unixSecondsToLocalString(ts) || '';
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      photo.onload = () => {
        try { URL.revokeObjectURL(url); } catch {}
        imageReady = true;
        imgW = photo.naturalWidth || 0;
        imgH = photo.naturalHeight || 0;
        updateDispRect();
        redraw();
        renderToolbar();
      };
      photo.src = url;
    } catch (_) {
    } finally {
      loadingImage = false; setSpinner(false); renderToolbar();
    }
  }

  // ---------- File Save/Load ----------
  function doFileSave() {
    if (!regions.length) return;
    const data = {
      regions: regions.map(r => ({
        name: r.name,
        description: r.description,
        geometry: {
          cx: r.geometry.cx,
          cy: r.geometry.cy,
          width: Math.round(r.geometry.width),
          height: Math.round(r.geometry.height),
          rotation_deg: r.geometry.rotation_deg,
        }
      }))
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const stamp = new Date();
    const y = stamp.getFullYear();
    const m = String(stamp.getMonth()+1).padStart(2,'0');
    const d = String(stamp.getDate()).padStart(2,'0');
    const hh = String(stamp.getHours()).padStart(2,'0');
    const mm = String(stamp.getMinutes()).padStart(2,'0');
    a.download = `regions-${y}${m}${d}-${hh}${mm}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 250);
  }

  function doFileLoad(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const obj = JSON.parse(String(reader.result || ''));
        const rr = parseRegionsPayloadStrict(obj);
        if (!rr) return;
        regions = normalizeRegions(rr).normalized;
        selected = -1;
        buildRegionSelect();
        syncSelectedToFields();
        setDirty(true);
        renderToolbar();
        redraw();
      } catch (_) {}
    };
    reader.readAsText(file);
  }

  // ---------- UI actions ----------
  btnRefresh.addEventListener('click', () => { if (!loadingImage) loadImageFromServer(); });

  btnPrev.addEventListener('click', () => stepSelection(-1));
  btnNext.addEventListener('click', () => stepSelection(1));

  btnAdd.addEventListener('click', () => {
    if (!imageReady || !imgW || !imgH) return;
    const name = uniqueRegionName();
    const w = Math.max(64, Math.round(imgW * 0.20));
    const h = Math.max(32, Math.round(imgH * 0.20));
    regions.push({
      name,
      description: "",
      geometry: { cx: imgW/2, cy: imgH/2, width: w, height: h, rotation_deg: 0 }
    });
    selected = regions.length - 1;
    buildRegionSelect();
    syncSelectedToFields();
    setDirty(true);
    renderToolbar();
    redraw();
  });

  btnDel.addEventListener('click', () => {
    if (!hasRealSelection()) return;
    const del = selected;
    regions.splice(del, 1);
    selected = regions.length ? Math.min(del, regions.length - 1) : 0;
    buildRegionSelect();
    syncSelectedToFields();
    setDirty(true);
    renderToolbar();
    redraw();
  });

  btnSave.addEventListener('click', () => { if (!savingRegions) saveRegionsToServer(); });
  btnRevert.addEventListener('click', () => { if (!loadingRegions) loadRegionsFromServer(); });

  regionSelect.addEventListener('change', () => {
    const i = Number(regionSelect.value);
    if (Number.isFinite(i)) selectIndex(i);
  });

  regionName.addEventListener('input', () => {
    if (!hasRealSelection()) return;
    const filtered = regionName.value.replace(/[^A-Za-z0-9_]/g, '');
    if (filtered !== regionName.value) regionName.value = filtered;
    const s = filtered.trim();
    if (!validateName(s)) return;
    if (regions.some((r, i) => i !== selected && r.name === s)) return;
    regions[selected].name = s;
    buildRegionSelect();
    setDirty(true);
    redraw();
  });

  regionDesc.addEventListener('input', () => {
    if (!hasRealSelection()) return;
    const normalized = normalizeDescription(regionDesc.value);
    if (normalized !== regionDesc.value) regionDesc.value = normalized;
    regions[selected].description = normalized;
    setDirty(true);
  });

  btnFileSave.addEventListener('click', () => { if (!btnFileSave.classList.contains('disabled')) doFileSave(); });
  btnFileLoad.addEventListener('click', () => {
    if (btnFileLoad.classList.contains('disabled')) return;
    fileInput.value = '';
    fileInput.click();
  });
  fileInput.addEventListener('change', () => doFileLoad(fileInput.files?.[0]));

  window.addEventListener('keydown', (e) => {
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.isContentEditable)) return;
    const k = e.key;
    const lower = k.length === 1 ? k.toLowerCase() : k;

    if (k === 'ArrowUp') { e.preventDefault(); if (!btnPrev.disabled) btnPrev.click(); return; }
    if (k === 'ArrowDown') { e.preventDefault(); if (!btnNext.disabled) btnNext.click(); return; }
    if (lower === 'n' || k === '+') { e.preventDefault(); if (!btnAdd.disabled) btnAdd.click(); return; }
    if (lower === 'd' || k === 'Delete' || k === 'Backspace') { e.preventDefault(); if (!btnDel.disabled) btnDel.click(); return; }
    if (lower === 's') { e.preventDefault(); if (!btnSave.disabled) btnSave.click(); return; }
    if (lower === 'r') { e.preventDefault(); if (!btnRevert.disabled) btnRevert.click(); return; }
    if (lower === 'w') { e.preventDefault(); if (!btnFileSave.classList.contains('disabled')) btnFileSave.click(); return; }
    if (lower === 'o') { e.preventDefault(); if (!btnFileLoad.classList.contains('disabled')) btnFileLoad.click(); return; }
  });

  btnZoomIn.addEventListener('click', () => {
    if (!imageReady || !dispRect) return;
    zoomAt(1.2, dispRect.stageW / 2, dispRect.stageH / 2);
  });
  btnZoomOut.addEventListener('click', () => {
    if (!imageReady || !dispRect) return;
    zoomAt(1 / 1.2, dispRect.stageW / 2, dispRect.stageH / 2);
  });
  btnZoomAll.addEventListener('click', () => resetZoomToShowAll());

  overlay.addEventListener('wheel', (e) => {
    if (!imageReady || !dispRect) return;
    e.preventDefault();
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    zoomAt(factor, x, y);
  }, { passive: false });

  // ---------- Pointer interaction ----------
  overlay.addEventListener('pointerdown', (e) => {
    if (!imageReady || !dispRect) return;

    const rect = card.getBoundingClientRect();
    const pCanvas = { x: e.clientX - rect.left, y: e.clientY - rect.top };

    const tgt = pickInteractionTarget(pCanvas);
    if (!tgt) {
      panDrag = {
        startX: pCanvas.x,
        startY: pCanvas.y,
        panX0: panX,
        panY0: panY,
        pointerId: e.pointerId,
        moved: false,
      };
      overlay.setPointerCapture(e.pointerId);
      e.preventDefault();
      return;
    }

    if (tgt.index !== selected) {
      selected = tgt.index;
      buildRegionSelect();
      syncSelectedToFields();
      redraw();
    }

    const g = regions[selected].geometry;
    const ht = tgt.hit;

    drag = {
      mode: ht.mode,
      handle: ht.handle || null,
      startCanvas: {x: pCanvas.x, y: pCanvas.y},
      centerCanvas0: imageToCanvas({x:g.cx, y:g.cy}),
      g0: JSON.parse(JSON.stringify(g)),
      rot0: Number(g.rotation_deg || 0),
      ang0: 0,
      pointerId: e.pointerId
    };

    if (ht.mode === 'rotate') {
      const c0 = drag.centerCanvas0;
      const dx = pCanvas.x - c0.x;
      const dy = pCanvas.y - c0.y;
      drag.ang0 = Math.atan2(-dy, dx);
    }

    overlay.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  overlay.addEventListener('pointermove', (e) => {
    if (panDrag && e.pointerId === panDrag.pointerId) {
      const rect = card.getBoundingClientRect();
      const pCanvas = { x: e.clientX - rect.left, y: e.clientY - rect.top };
      const dx = pCanvas.x - panDrag.startX;
      const dy = pCanvas.y - panDrag.startY;
      panX = panDrag.panX0 + dx;
      panY = panDrag.panY0 + dy;
      panDrag.moved = panDrag.moved || (Math.abs(dx) + Math.abs(dy) > 2);
      redraw();
      return;
    }

    if (!drag || e.pointerId !== drag.pointerId || !hasRealSelection()) return;

    const rect = card.getBoundingClientRect();
    const pCanvas = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    const g = regions[selected].geometry;
    const g0 = drag.g0;

    const sxInv = imgW / dispRect.w;
    const syInv = imgH / dispRect.h;

    if (drag.mode === 'move') {
      const dx = pCanvas.x - drag.startCanvas.x;
      const dy = pCanvas.y - drag.startCanvas.y;
      g.cx = g0.cx + dx * sxInv;
      g.cy = g0.cy + dy * syInv;
      setDirty(true);
      redraw();
      return;
    }

    if (drag.mode === 'rotate') {
      const c0 = drag.centerCanvas0;
      const dx = pCanvas.x - c0.x;
      const dy = pCanvas.y - c0.y;
      const ang = Math.atan2(-dy, dx);
      const delta = ang - drag.ang0;
      g.rotation_deg = drag.rot0 + deg(delta);
      setDirty(true);
      redraw();
      return;
    }

    if (drag.mode === 'resize') {
      // Asymmetric resize: the dragged handle moves, the opposite side/corner stays fixed.
      // Work in region-local DISPLAY coordinates, then convert back to image coords.
      const theta0 = rad(g0.rotation_deg || 0); // world->local
      const c0 = drag.centerCanvas0;

      const ddx = pCanvas.x - c0.x;
      const ddy = pCanvas.y - c0.y;
      const lx = ddx*Math.cos(theta0) - ddy*Math.sin(theta0);
      const ly = ddx*Math.sin(theta0) + ddy*Math.cos(theta0);

      const sx = dispRect.w / imgW;
      const sy = dispRect.h / imgH;

      const w0 = g0.width * sx;
      const h0 = g0.height * sy;

      // Fixed point in local coords (relative to center) is the opposite handle.
      let fx = 0, fy = 0;
      let px = lx, py = ly; // pointer in local coords

      const h = drag.handle;
      if (h === 'nw') { fx =  w0/2; fy =  h0/2; }
      if (h === 'n')  { fx =   0;   fy =  h0/2; px = 0; }         // only y changes
      if (h === 'ne') { fx = -w0/2; fy =  h0/2; }
      if (h === 'e')  { fx = -w0/2; fy =   0;   py = 0; }         // only x changes
      if (h === 'se') { fx = -w0/2; fy = -h0/2; }
      if (h === 's')  { fx =   0;   fy = -h0/2; px = 0; }         // only y changes
      if (h === 'sw') { fx =  w0/2; fy = -h0/2; }
      if (h === 'w')  { fx =  w0/2; fy =   0;   py = 0; }         // only x changes

      // New size in display px
      let wDisp = w0;
      let hDisp = h0;

      if (h === 'e' || h === 'w') {
        wDisp = Math.abs(px - fx);
        hDisp = h0;
      } else if (h === 'n' || h === 's') {
        hDisp = Math.abs(py - fy);
        wDisp = w0;
      } else {
        wDisp = Math.abs(px - fx);
        hDisp = Math.abs(py - fy);
      }

      wDisp = Math.max(2, wDisp);
      hDisp = Math.max(2, hDisp);

      // New center in local coords (midpoint between pointer and fixed)
      let cxL = (px + fx) / 2;
      let cyL = (py + fy) / 2;

      // For edge handles, constrain center along the non-changing axis
      if (h === 'e' || h === 'w') cyL = 0;
      if (h === 'n' || h === 's') cxL = 0;

      // Convert new local-center offset to canvas delta: local->world uses R(theta_draw), theta_draw = -rot
      const thetaDraw = -rad(g0.rotation_deg || 0);
      const dcx = cxL*Math.cos(thetaDraw) - cyL*Math.sin(thetaDraw);
      const dcy = cxL*Math.sin(thetaDraw) + cyL*Math.cos(thetaDraw);

      // Apply to image-space center
      g.cx = g0.cx + dcx * (imgW / dispRect.w);
      g.cy = g0.cy + dcy * (imgH / dispRect.h);

      g.width  = Math.max(64, Math.round(wDisp / sx));
      g.height = Math.max(32, Math.round(hDisp / sy));

      setDirty(true);
      redraw();
      return;
    }
  });

  overlay.addEventListener('pointerup', (e) => {
    if (panDrag && e.pointerId === panDrag.pointerId) {
      suppressNextClick = panDrag.moved;
      panDrag = null;
      try { overlay.releasePointerCapture(e.pointerId); } catch {}
      return;
    }
    if (!drag || e.pointerId !== drag.pointerId) return;
    drag = null;
    try { overlay.releasePointerCapture(e.pointerId); } catch {}
  });
  overlay.addEventListener('pointercancel', (e) => {
    if (panDrag && e.pointerId === panDrag.pointerId) {
      panDrag = null;
      try { overlay.releasePointerCapture(e.pointerId); } catch {}
      return;
    }
    if (!drag || e.pointerId !== drag.pointerId) return;
    drag = null;
    try { overlay.releasePointerCapture(e.pointerId); } catch {}
  });

  overlay.addEventListener('click', (e) => {
    if (drag || panDrag) return;
    if (suppressNextClick) {
      suppressNextClick = false;
      return;
    }
    if (!imageReady || !dispRect) return;
    const rect = card.getBoundingClientRect();
    const pCanvas = { x: e.clientX - rect.left, y: e.clientY - rect.top };

    // Prefer handle target for selection too
    const tgt = pickInteractionTarget(pCanvas);
    if (tgt) {
      selectIndex(tgt.index);
      return;
    }
    const pick = pickRegionForSelect(pCanvas);
    if (pick !== null) selectIndex(pick);
    else selectIndex(-1);
  });

  window.addEventListener('resize', () => redraw());

  function init() {
    lastRefresh.textContent = '';
    renderToolbar();

    btnFileSave.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); btnFileSave.click(); }});
    btnFileLoad.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); btnFileLoad.click(); }});

    loadRegionsFromServer();
    loadImageFromServer();
  }
  init();
})();
</script>
</body>
